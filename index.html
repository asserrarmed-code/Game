<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مُعترك الضاد: شاشة العرض الكبرى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; max-width: 100%; }
        :root {
            --moroccan-blue: #006847; --moroccan-gold: #c5a059; --deep-red: #8b0000;
            --bg-light: #f4f1ea; --card: #ffffff; --text: #333;
            --success: #10b981; --danger: #ef4444;
        }
        body {
            background-color: var(--bg-light);
            background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png');
            color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* تنسيق الهيدر */
        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; width: 100%; max-width: 1200px; margin: 0 auto;
        }
        .logo-box { width: 80px; height: 80px; background: white; border-radius: 50%; border: 3px solid var(--moroccan-gold); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .title-area img { max-height: 120px; object-fit: contain; }

        /* حاوية العرض */
        .container { width: 95%; max-width: 1100px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; justify-content: center; z-index: 2; }
        
        /* لوحة النقاط والكيو آر */
        .scoreboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .team-box {
            background: var(--card); padding: 15px; border-radius: 20px;
            border: 3px solid #ddd; text-align: center; position: relative;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .team-box.active-turn { border-color: var(--danger); transform: scale(1.05); box-shadow: 0 0 30px rgba(239,68,68,0.4); }
        
        .qr-container { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin: 10px 0; border: 1px solid #eee; }

        /* منطقة السؤال */
        .card {
            background: var(--card); padding: 30px; border-radius: 25px;
            border-top: 8px solid var(--moroccan-blue); box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center; width: 100%; min-height: 300px; position: relative;
        }
        
        #timer { font-size: 4rem; color: var(--danger); font-weight: 900; margin: 10px 0; }
        #q-text { font-size: 2.2rem; font-family: 'Amiri'; font-weight: bold; margin: 20px 0; line-height: 1.4; }
        #phase-label { background: var(--moroccan-blue); color: white; padding: 5px 20px; border-radius: 50px; font-size: 1rem; }

        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .opt { background: #f8fafc; border: 3px solid #e2e8f0; padding: 15px; border-radius: 15px; font-size: 1.3rem; font-weight: bold; }

        /* إخفاء لوحة التحكم من الشاشة الكبرى */
        .admin-panel, .top-controls { display: none !important; }

        #setup-screen { text-align: center; padding: 50px; }
        .setup-card { background: white; padding: 40px; border-radius: 30px; display: inline-block; border: 4px solid var(--moroccan-gold); }
        
        .lifeline-status { font-size: 1.2rem; margin-top: 5px; }
        .lifeline-status span { opacity: 0.2; margin: 0 3px; }
        .lifeline-status span.active { opacity: 1; filter: drop-shadow(0 0 5px gold); }
    </style>
</head>

<body>

<div class="header-top">
    <div class="logo-box"><img src="logo-cup.png" alt="Logo"></div>
    <div class="title-area"><img src="banner-cup.png" alt="Banner"></div>
    <div class="logo-box"><img src="logo.png" alt="Logo"></div>
</div>

<div id="setup-screen">
    <div class="setup-card">
        <h2 style="color: var(--moroccan-blue);">تهيئة معترك الضاد</h2>
        <p>أدخل عدد الفرق المشاركة لعرض أكواد الاستجابة</p>
        <select id="team-count" style="padding:15px; font-size:1.2rem; border-radius:10px; border:2px solid var(--moroccan-gold);">
            <option value="2">فريقان (2)</option>
            <option value="3">ثلاثة فرق (3)</option>
            <option value="4" selected>أربعة فرق (4)</option>
        </select>
        <br><br>
        <button onclick="startMarathon()" style="background:var(--moroccan-blue); color:white; padding:15px 40px; font-size:1.5rem; border-radius:50px; border:none; cursor:pointer;">عرض الشاشة الكبرى 📺</button>
    </div>
</div>

<div id="quiz-screen" class="container" style="display:none;">
    <div id="dynamic-scoreboard" class="scoreboard"></div>
    
    <div class="card">
        <div id="target-announcer" style="background: var(--danger); color: white; padding: 8px 20px; border-radius: 15px; font-size: 1.4rem; margin-bottom: 15px; display: none; font-weight: 900;"></div>
        <div id="phase-label">بانتظار انطلاق المعترك...</div>
        <div id="timer">--</div>
        <div id="q-text">أهلاً بكم في معترك الضاد.. المعلم يتحكم الآن</div>
        
        <div id="component-display" style="display:none; font-size: 2rem; color: var(--moroccan-gold); font-weight: 900; margin: 20px;"></div>
        
        <div class="options-grid" id="opt-container"></div>
        
        <div id="manual-answer-zone" style="display:none; margin-top: 20px; border-top: 2px dashed #ddd; padding-top: 20px;">
            <div style="color: var(--moroccan-blue); font-size: 1.8rem; font-weight: 900;" id="revealed-answer"></div>
        </div>
    </div>
</div>

<script>
let db, roomRef;
let teamNames = [], scores = [];

function startMarathon() {
    const count = document.getElementById('team-count').value;
    for(let i=0; i<count; i++) {
        teamNames.push(`الفريق ${i+1}`);
        scores.push(0);
    }
    
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'flex';
    
    initFirebase();
    renderInterface();
}

function initFirebase() {
    if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
    db = firebase.database();
    roomRef = db.ref('rooms/moatark-main-room');

    // 1. مراقبة الأسئلة القادمة من "الهوست"
    roomRef.child('currentQuestion').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        
        updateDisplay(data);
    });

    // 2. مراقبة النقاط والمساعدات
    roomRef.child('teams').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        updateScoresAndLifelines(data);
    });
}

function renderInterface() {
    const sb = document.getElementById('dynamic-scoreboard');
    sb.innerHTML = '';
    
    teamNames.forEach((name, i) => {
        const playerUrl = `${window.location.origin}/player.html?team=${i+1}`;
        
        sb.innerHTML += `
            <div class="team-box" id="t-card-${i}">
                <div style="font-weight:900; color:var(--moroccan-blue);">${name}</div>
                <div id="qr-${i}" class="qr-container"></div>
                <div style="font-size:2.5rem; font-weight:900; color:var(--moroccan-gold);" id="s-${i}">0</div>
                <div class="lifeline-status" id="l-status-${i}">
                    <span id="l-del-${i}">💡</span>
                    <span id="l-dou-${i}">🚀</span>
                    <span id="l-stp-${i}">⏱️</span>
                </div>
            </div>`;

        // توليد الكيو آر
        setTimeout(() => {
            new QRCode(document.getElementById(`qr-${i}`), {
                text: playerUrl,
                width: 100,
                height: 100,
                colorDark : "#006847",
                colorLight : "#ffffff"
            });
        }, 200);
    });
}

function updateDisplay(data) {
    document.getElementById('q-text').innerText = data.text || "";
    document.getElementById('phase-label').innerText = data.phaseName || "المعترك قائم";
    document.getElementById('timer').innerText = data.timeLeft || "--";
    
    // إظهار المنادي (Target)
    const announcer = document.getElementById('target-announcer');
    if(data.targetTeamName) {
        announcer.innerText = `🎯 الدور على: ${data.targetTeamName}`;
        announcer.style.display = 'block';
    } else {
        announcer.style.display = 'none';
    }

    // عرض الخيارات
    const optContainer = document.getElementById('opt-container');
    optContainer.innerHTML = '';
    if(data.options) {
        data.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'opt';
            btn.innerText = opt;
            if(data.revealed && idx == data.correctIdx) {
                btn.style.background = 'var(--success)';
                btn.style.color = 'white';
            }
            optContainer.appendChild(btn);
        });
    }

    // كشف الجواب اليدوي
    const manualZone = document.getElementById('manual-answer-zone');
    const revealedText = document.getElementById('revealed-answer');
    if(data.revealed && data.answerText) {
        revealedText.innerText = "الجواب الصحيح: " + data.answerText;
        manualZone.style.display = 'block';
    } else {
        manualZone.style.display = 'none';
    }

    // تمييز الفريق النشط
    document.querySelectorAll('.team-box').forEach(box => box.classList.remove('active-turn'));
    if(data.targetTeamIdx !== undefined) {
        document.getElementById(`t-card-${data.targetTeamIdx}`).classList.add('active-turn');
    }
}

function updateScoresAndLifelines(data) {
    Object.keys(data).forEach(key => {
        const teamIdx = parseInt(key.replace('team', '')) - 1;
        const teamData = data[key];
        
        // تحديث النقاط
        const scoreEl = document.getElementById(`s-${teamIdx}`);
        if(scoreEl) scoreEl.innerText = teamData.score || 0;
        
        // تحديث المساعدات
        if(teamData.lifelines) {
            if(teamData.lifelines.del) document.getElementById(`l-del-${teamIdx}`).classList.add('active');
            if(teamData.lifelines.dou) document.getElementById(`l-dou-${teamIdx}`).classList.add('active');
            if(teamData.lifelines.stp) document.getElementById(`l-stp-${teamIdx}`).classList.add('active');
        }
    });
}
</script>

</body>
</html>
