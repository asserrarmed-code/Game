<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>فريق - معترك الضاد</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box}body{font-family:Cairo,sans-serif;margin:0;min-height:100vh;background:#f4f1ea;background-image:url('https://www.transparenttextures.com/patterns/az-subtle.png');display:flex;align-items:center;justify-content:center;padding:16px;color:#333}.card{background:white;border-top:7px solid #006847;border-radius:22px;box-shadow:0 8px 25px rgba(0,0,0,.14);width:100%;max-width:520px;padding:20px;text-align:center}.team-head{font-size:1.6rem;font-weight:900;color:#006847}.score{font-size:2.8rem;font-weight:900;color:#c5a059}.lifelines{display:flex;gap:8px;justify-content:center;margin:8px 0 15px}.life{background:#f8fafc;border:2px solid #e2e8f0;border-radius:999px;padding:7px 12px;font-weight:900}.used{opacity:.3;text-decoration:line-through}.badge{display:inline-block;background:#006847;color:white;border-radius:999px;padding:4px 12px;font-weight:900}.timer{font-size:2.4rem;font-weight:900;color:#ef4444}.question{font-family:Amiri,serif;font-size:1.55rem;font-weight:700;line-height:1.5;margin:12px 0}.choice{display:block;width:100%;padding:16px;margin:10px 0;border:2px solid #006847;border-radius:14px;background:white;font-weight:900;font-size:1.05rem}.choice:disabled{opacity:.5}.input{width:100%;padding:14px;border:2px solid #c5a059;border-radius:12px;text-align:center;font-size:1.1rem}.btn{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;background:#10b981;color:white;font-weight:900;font-size:1.05rem}.waiting{font-size:1.7rem;font-weight:900;color:#006847}.ok{color:#10b981;font-size:1.2rem;font-weight:900;margin-top:10px}</style></head><body><div class="card"><div class="team-head" id="teamName">الفريق</div><div class="score" id="score">0</div><div class="lifelines"><span class="life" id="life-del">💡</span><span class="life" id="life-dou">🚀</span><span class="life" id="life-stp">⏱️</span></div><div id="phase" class="badge">في الانتظار</div><div id="timer" class="timer">⏳</div><div id="status" class="waiting">انتظروا الأستاذ</div><div id="question" class="question"></div><div id="choices"></div><div id="freeZone" style="display:none"><input id="freeAnswer" class="input" placeholder="اكتبوا الجواب هنا"><button class="btn" onclick="sendFree()">إرسال الجواب ✅</button></div><div id="sent" class="ok" style="display:none">تم إرسال جوابكم ✅</div><div id="reveal" class="ok" style="display:none"></div></div><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script><script src="firebase-config.js"></script><script>
(function(){const params=new URLSearchParams(location.search);const teamId=params.get('team')||localStorage.getItem('moatark_player_team')||'team1';localStorage.setItem('moatark_player_team',teamId);let db,room,current,dataCache;function $(id){return document.getElementById(id)}function init(){if(!window.firebaseConfig||String(window.firebaseConfig.apiKey||'').includes('PUT_YOUR')){$('status').innerText='ضعي معلومات Firebase في firebase-config.js';return;}firebase.initializeApp(window.firebaseConfig);db=firebase.database();room=db.ref('rooms/'+(window.ROOM_ID||'moatark-main-room'));room.on('value',s=>{dataCache=s.val()||{};render(dataCache)});}function render(data){const t=data.teams&&data.teams[teamId];$('teamName').innerText=t?t.name:teamId;$('score').innerText=(data.scores&&data.scores[teamId])||(t&&t.score)||0;const life=(data.lifelines&&data.lifelines[teamId])||(t&&t.lifelines)||{};['del','dou','stp'].forEach(k=>{$('life-'+k).className='life '+(life[k]?'used':'')});current=data.currentQuestion;const myAns=data.answers&&data.answers[teamId];$('sent').style.display=myAns?'block':'none';$('choices').innerHTML='';$('freeZone').style.display='none';$('reveal').style.display='none';if(data.final){$('phase').innerText='النهاية';$('timer').innerText='🏆';$('status').innerText='انتهت المسابقة';$('question').innerText='شكراً للمشاركة';return;}if(!current){$('phase').innerText='في الانتظار';$('timer').innerText='⏳';$('status').innerText='انتظروا الأستاذ';$('question').innerText='';return;}$('phase').innerText=current.phaseName||'';if(current.targetTeam!=='all'&&current.targetTeam!==teamId){$('timer').innerText='—';$('status').innerText='ليس دوركم الآن ⏳';$('question').innerText='الدور الآن لـ: '+(current.targetTeamName||'فريق آخر');return;}$('status').innerText=current.targetTeam==='all'?'أجيبوا الآن':'دوركم الآن 🎯';$('question').innerText=current.text||'';if(current.boxMode){$('status').innerText='انتظروا اختيار الصندوق من الأستاذ';}else if(current.options&&current.options.length){current.options.forEach((o,i)=>{const b=document.createElement('button');b.className='choice';b.innerText=o;b.disabled=!!myAns||data.revealed||current.revealed;b.onclick=()=>sendAnswer(i,o);$('choices').appendChild(b);});}else if(!myAns&&!data.revealed&&!current.revealed){$('freeZone').style.display='block';}if((data.revealed||current.revealed)){let txt='';if(current.options&&current.correctIndex!=null)txt='الجواب الصحيح: '+current.options[current.correctIndex];else if(current.modelAnswer)txt='الجواب: '+current.modelAnswer;if(txt){$('reveal').style.display='block';$('reveal').innerText=txt;}}startTimer(current.time||20,current.startedAt||Date.now());}
function startTimer(seconds,startedAt){clearInterval(window.__pt);function tick(){const left=Math.max(0,seconds-Math.floor((Date.now()-startedAt)/1000));$('timer').innerText=left;}tick();window.__pt=setInterval(tick,1000)}window.sendFree=function(){const v=$('freeAnswer').value.trim();if(!v)return alert('اكتبوا الجواب أولاً');sendAnswer(null,v)};function sendAnswer(idx,text){if(!current)return;db.ref('rooms/'+(window.ROOM_ID||'moatark-main-room')+'/answers/'+teamId).set({teamId:teamId,answerIndex:idx,answerText:text,phaseIndex:current.phaseIndex,questionIndex:current.questionIndex,correct:(idx!==null&&current.correctIndex!==null)?Number(idx)===Number(current.correctIndex):null,sentAt:Date.now()});$('sent').style.display='block';}window.addEventListener('load',init);})();
</script></body></html>
