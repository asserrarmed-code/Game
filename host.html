
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة الأستاذ: مُعترك الضاد</title>
    <style>
        /* إضافة بسيطة لجمالية التنبيه */
        #firebase-status {
            position: fixed; top: 10px; left: 10px; padding: 4px 10px;
            background: white; border-radius: 8px; font-weight: 900;
            z-index: 100001; font-size: 0.7rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// --- الجزء الأول: المنطق الأساسي للعبة (مع التعديلات لضمان الربط) ---
let teamNames = [], scores = [], currentPhase = 0, currentQ = 0, timer, phaseTurns = [];
let votedOnThisQuestion = [], currentModelAnswer = "", currentQuestionText = "";
let lifelinesState = [], rocketActive = -1;
let stockCounts = {};
let usedByBox = {};
const STOCK_KEYS = ["المدرسة", "المحفظة", "الكتاب"];

// إعداد Firebase
if (!firebase.apps.length) { firebase.initializeApp(window.firebaseConfig); }
const db = firebase.database();
const roomRef = db.ref('rooms/moatark-main-room');

// دالة البدء الرئيسية (معدلة للإرسال لـ Firebase)
function startMarathon() {
    const count = parseInt(document.getElementById('team-count').value);
    teamNames = []; scores = []; lifelinesState = [];
    let fbTeams = {};

    for (let i = 0; i < count; i++) {
        let name = document.getElementById(`tn-${i}`).value;
        teamNames.push(name);
        scores.push(0);
        lifelinesState.push({ del: false, dou: false, stp: false });
        fbTeams[`team${i+1}`] = { name: name, score: 0, lifelines: {del:false, dou:false, stp:false} };
    }
    
    // إرسال البيانات الابتدائية للقاعدة
    roomRef.set({
        status: "started",
        teams: fbTeams,
        scores: scores,
        currentQuestion: null,
        lastUpdate: Date.now()
    });

    initStockCounts();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display  = 'flex';
    renderInterface(); 
    prepareTurns(); 
    init(); // تشغيل أول سؤال
}

// دالة المزامنة الرئيسية (هي التي ترسل لكل الطلاب)
function syncToFirebase() {
    const p = phasesData[currentPhase];
    const q = (p && p.questions) ? p.questions[currentQ] : null;
    
    // منطق الأنماط: تحديد من يرى السؤال
    let target = 'all';
    if (p.type === 'target' || p.type === 'free') {
        target = `team${phaseTurns[currentQ] + 1}`;
    }

    const questionData = {
        text: document.getElementById('q-text').innerText,
        phaseName: p.name,
        time: p.time,
        startedAt: Date.now(),
        questionId: Math.random().toString(36).substr(2, 9),
        options: q && q.o ? q.o : [],
        correctIndex: q ? q.a : -1,
        targetTeam: target,
        boxMode: (p.type === 'free' && !currentModelAnswer), // وضع اختيار الصندوق
        revealed: false
    };

    roomRef.child('currentQuestion').set(questionData);
    roomRef.child('scores').set(scores); // مزامنة النقاط باستمرار
}

// تعديل دالة init لتعمل بالمزامنة
const originalInit = window.init;
window.init = function() {
    // (المنطق الأصلي في ملفك مع استدعاء المزامنة في النهاية)
    votedOnThisQuestion = teamNames.map(() => false);
    const p = phasesData[currentPhase];
    currentModelAnswer = ""; currentQuestionText = ""; rocketActive = -1;
    clearInterval(timer);

    // ... (مسح الواجهة كما في كودك) ...
    document.getElementById('q-text').innerText = '';
    document.getElementById('opt-container').innerHTML = '';
    document.getElementById('component-selection').style.display = 'none';
    document.getElementById('manual-zone').style.display = 'none';
    
    if (!p) return;

    if (p.type === 'free') {
        const tid = phaseTurns[currentQ];
        document.getElementById('target-announcer').style.display = 'block';
        document.getElementById('target-announcer').innerHTML = `🎯 الصندوق العجيب لـ: ${teamNames[tid]}`;
        showFreeSelection();
        startTimer(p.time);
    } else if (p.type === 'target') {
        const tid = phaseTurns[currentQ];
        document.getElementById('target-announcer').style.display = 'block';
        document.getElementById('target-announcer').innerHTML = `🎯 الدور: ${teamNames[tid]}`;
        displayQuestion(p.questions[currentQ]);
    } else {
        displayQuestion(p.questions[currentQ]);
    }

    syncToFirebase(); // ⚡ إرسال الإشارة للطلاب فوراً
};

// تعديل دالة كشف الإجابة
function reveal() {
    clearInterval(timer);
    // (المنطق الأصلي لكشف الإجابة)
    const p = phasesData[currentPhase];
    // ...
    // إرسال إشارة كشف الإجابة للطلاب
    roomRef.child('currentQuestion/revealed').set(true);
}

// تعديل دالة اختيار الصندوق لمزامنة محتوى الصندوق
function selectComponent(key) {
    // (منطق الاختيار من الصناديق)
    // ... بعد اختيار السؤال:
    const item = available[Math.floor(Math.random() * available.length)];
    document.getElementById('q-text').innerText = `📦 ${key}: ${item.q}`;
    currentModelAnswer = item.a;
    
    // تحديث الطلاب فور اختيار الصندوق
    roomRef.child('currentQuestion').update({
        text: `📦 ${key}: ${item.q}`,
        boxMode: false,
        modelAnswer: item.a
    });
}

// دالة مراقبة الاتصال (اللمسة الجمالية)
db.ref('.info/connected').on('value', (s) => {
    const status = document.getElementById('firebase-status') || document.createElement('div');
    status.id = 'firebase-status';
    status.innerText = s.val() ? "✅ متصل بالطلاب" : "❌ انقطع الاتصال";
    status.style.color = s.val() ? "#006847" : "#ef4444";
    if(!status.parentElement) document.body.appendChild(status);
});

// (أكمل باقي الدوال كما هي في ملفك: displayQuestion, startTimer, next, modifyScore...

function modifyScore(i, v) {
    if (votedOnThisQuestion[i]) return;
    let val = (rocketActive === i) ? (v > 0 ? 20 : -10) : v;
    scores[i] += val;
    document.getElementById(`s-${i}`).innerText = scores[i];
    votedOnThisQuestion[i] = true;
    rocketActive = -1;
}

function useLifeline(teamIdx, type, element) {
    if (lifelinesState[teamIdx][type]) return;
    if (type === 'del') {
        const p = phasesData[currentPhase];
        if (p && p.questions && p.questions[currentQ] && p.questions[currentQ].o) {
            const correct = parseInt(p.questions[currentQ].a);
            const opts = Array.from(document.querySelectorAll('.opt'));
            let wrong = opts.map((_, i) => i).filter(i => i !== correct);
            wrong.sort(() => Math.random() - 0.5).slice(0, 2).forEach(idx => { opts[idx].style.visibility = 'hidden'; });
        }
    } else if (type === 'dou') { rocketActive = teamIdx; }
    else if (type === 'stp') { clearInterval(timer); }
    lifelinesState[teamIdx][type] = true;
    element.style.opacity = "0.2";
}

function prepareTurns() {
    phaseTurns = [];
    const count = teamNames.length;
    const p = phasesData[currentPhase];
    if (!p) return;
    if (p.type === 'target') { for (let i = 0; i < count; i++) for (let j = 0; j < 3; j++) phaseTurns.push(i); }
    else if (p.type === 'free') { for (let i = 0; i < count; i++) for (let j = 0; j < 2; j++) phaseTurns.push(i); }
    phaseTurns.sort(() => Math.random() - 0.5);
}

function init() {
    votedOnThisQuestion = teamNames.map(() => false);
    const p = phasesData[currentPhase];
    currentModelAnswer  = ""; currentQuestionText = ""; rocketActive = -1;
    clearInterval(timer);

    document.getElementById('q-text').innerText = '';
    document.getElementById('opt-container').innerHTML = '';
    document.getElementById('component-selection').style.display = 'none';
    document.getElementById('manual-zone').style.display = 'none';
    document.getElementById('target-announcer').style.display = 'none';
    document.getElementById('answer-input').value = '';
    document.getElementById('manual-answer-display').innerText = '...';
    document.getElementById('manual-answer-display').classList.remove('revealed');
    document.querySelectorAll('.team-box').forEach(b => b.classList.remove('active-turn'));

    if (!p) return;
    document.getElementById('phase-label').innerText = p.name;

    if (p.type === 'free') {
        const tid = phaseTurns[currentQ];
        document.getElementById('target-announcer').style.display = 'block';
        document.getElementById('target-announcer').innerHTML = `🎯 الصندوق العجيب لـ: ${teamNames[tid]}`;
        document.getElementById(`t-card-${tid}`).classList.add('active-turn');
        showFreeSelection();
        // 🛠️ تعديل النمط 3: يبدأ المؤقت بمجرد ظهور اسم الفريق
        startTimer(p.time); 

    } else if (p.type === 'target') {
        const tid = phaseTurns[currentQ];
        document.getElementById('target-announcer').style.display = 'block';
        document.getElementById('target-announcer').innerHTML = `🎯 الدور: ${teamNames[tid]}`;
        document.getElementById(`t-card-${tid}`).classList.add('active-turn');
        displayQuestion(p.questions[currentQ]);

    } else if (p.type === 'speed') {
        const q = p.questions[currentQ];
        if (!q) return;
        currentQuestionText = q.q; currentModelAnswer = q.a;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('manual-zone').style.display = 'block';
        startTimer(p.time, true);

    } else {
        displayQuestion(p.questions[currentQ]);
    }
}

function displayQuestion(q) {
    if (!q) return;
    document.getElementById('q-text').innerText = q.q;
    if (q.o) { q.o.forEach(opt => { document.getElementById('opt-container').innerHTML += `<button class="opt">${opt}</button>`; }); }
    startTimer(phasesData[currentPhase].time);
}

function showFreeSelection() {
    document.getElementById('component-selection').style.display = 'flex';
    STOCK_KEYS.forEach(key => {
        const remaining = stockCounts[key];
        const countEl = document.getElementById(`count-${key}`);
        const btnEl = document.getElementById(`btn-${key}`);
        countEl.innerText = `(${remaining})`;
        if (remaining <= 0) { btnEl.disabled = true; btnEl.classList.add('depleted'); btnEl.onclick = null; }
        else { btnEl.disabled = false; btnEl.classList.remove('depleted'); btnEl.onclick = () => selectComponent(key); }
    });
}

function selectComponent(key) {
    if (stockCounts[key] <= 0) return;
    const stock = getStockData();
    const questions = stock[key];
    if (!questions || questions.length === 0) return;

    let available = questions.filter(q => !usedByBox[key].has(q.q));
    if (available.length === 0) { usedByBox[key].clear(); available = questions; }

    const item = available[Math.floor(Math.random() * available.length)];
    usedByBox[key].add(item.q);
    stockCounts[key]--;

    document.getElementById(`count-${key}`).innerText = `(${stockCounts[key]})`;
    if (stockCounts[key] <= 0) {
        const btnEl = document.getElementById(`btn-${key}`);
        btnEl.disabled = true; btnEl.classList.add('depleted'); btnEl.onclick = null;
    }

    document.getElementById('component-selection').style.display = 'none';
    document.getElementById('manual-zone').style.display = 'block';
    document.getElementById('q-text').innerText = `📦 ${key}: ${item.q}`;
    currentModelAnswer = item.a;
    // 🛠️ تم إزالة استدعاء startTimer من هنا لكي لا يبدأ من جديد
}

function startTimer(s, isSpeed = false) {
    let tl = s;
    document.getElementById('timer').innerText = tl;
    timer = setInterval(() => {
        tl--;
        document.getElementById('timer').innerText = tl;
        if (tl <= 0) {
            clearInterval(timer);
            if (isSpeed) document.getElementById('q-text').innerText = '';
        }
    }, 1000);
}

function reveal() {
    clearInterval(timer);
    const p = phasesData[currentPhase];
    if (currentModelAnswer !== "") {
        if (currentQuestionText) document.getElementById('q-text').innerText = currentQuestionText;
        const dispEl = document.getElementById('manual-answer-display');
        dispEl.innerText = currentModelAnswer;
        dispEl.style.color = 'var(--success)';
        dispEl.classList.remove('revealed');
        void dispEl.offsetWidth; 
        dispEl.classList.add('revealed');
        document.getElementById('manual-zone').style.display = 'block';
    } else if (p.questions && p.questions[currentQ] && p.questions[currentQ].o) {
        const d = p.questions[currentQ];
        const opts = document.querySelectorAll('.opt');
        const idx = parseInt(d.a);
        if (opts[idx]) { opts[idx].style.background = 'var(--success)'; opts[idx].style.color = 'white'; }
    }
}

function next() {
    const p = phasesData[currentPhase];
    if (!p) return;
    currentQ++;
    const limit = (p.type === 'target' || p.type === 'free') ? phaseTurns.length : (p.questions ? p.questions.length : 0);
    if (currentQ >= limit) { currentQ = 0; currentPhase++; if (currentPhase < phasesData.length) prepareTurns(); }
    if (currentPhase >= phasesData.length) {
        clearInterval(timer);
        document.getElementById('q-text').innerText = '';
        document.getElementById('opt-container').innerHTML = '';
        document.getElementById('manual-zone').style.display = 'none';
        document.getElementById('component-selection').style.display = 'none';
        document.getElementById('timer').innerText = "🏁";
        document.getElementById('finish-screen').style.display = 'block';
    } else { init(); }
}

function syncAnswer(v) { document.getElementById('manual-answer-display').innerText = v || '...'; }

updateTeamInputs(4);
</script>

<p>player.html?team=team3</p>

<script>
(function() {
    // التحقق من وجود الإعدادات
    if (!window.firebaseConfig) {
        console.error("إعدادات Firebase غير موجودة!");
        return;
    }

    // 1. بدء الاتصال
    if (!firebase.apps.length) {
        firebase.initializeApp(window.firebaseConfig);
    }
    const db = firebase.database();
    const roomRef = db.ref('rooms/moatark-main-room');

    // 2. إنشاء عنصر لعرض حالة الاتصال في أعلى الصفحة
    const statusMsg = document.createElement('div');
    statusMsg.id = 'firebase-status';
    statusMsg.style = "position:fixed; top:5px; left:5px; padding:5px 12px; background:white; border:2px solid #ccc; border-radius:8px; font-weight:900; z-index:100001; font-size:0.8rem;";
    document.body.appendChild(statusMsg);

    // 3. مراقبة الاتصال الحقيقي
    db.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true) {
            statusMsg.innerText = "✅ Firebase متصل الآن";
            statusMsg.style.color = "#006847";
            statusMsg.style.borderColor = "#006847";
            // إرسال إشارة للقاعدة أن الهوست بدأ العمل
            roomRef.update({ status: "started", hostConnected: true, lastSeen: Date.now() });
        } else {
            statusMsg.innerText = "❌ جاري محاولة الاتصال...";
            statusMsg.style.color = "#ef4444";
            statusMsg.style.borderColor = "#ef4444";
        }
    });

    // 4. تعديل وظيفة البداية (startMarathon) لإرسال البيانات للطلاب
    const originalStart = window.startMarathon;
    window.startMarathon = function() {
        if(originalStart) originalStart();
        // تحديث أسماء الفرق في القاعدة
        roomRef.update({
            teams: teamNames.reduce((acc, name, i) => {
                acc[`team${i+1}`] = { name: name, score: 0 };
                return acc;
            }, {})
        });
    };

    // 5. تعديل وظيفة الأسئلة (init) لمزامنة الشاشات
    const originalInit = window.init;
    window.init = function() {
        if(originalInit) originalInit();
        const p = phasesData[currentPhase];
        const q = (p && p.questions) ? p.questions[currentQ] : null;
        
        roomRef.update({
            currentQuestion: {
                text: document.getElementById('q-text').innerText,
                phaseName: p ? p.name : 'جولة جديدة',
                time: p ? p.time : 20,
                startedAt: Date.now(),
                options: q && q.o ? q.o : [],
                correctIndex: q ? q.a : -1,
                revealed: false
            }
        });
    };
})();
</script>
