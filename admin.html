<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #006847; --gold: #c5a059; --ai: #7c3aed; }
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; text-align: center; margin:0; }
        .card { background: white; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .ai-zone { background: #f5f3ff; border: 2px dashed var(--ai); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.2s; }
        .btn-ai { background: var(--ai); color: white; width: 100%; font-size: 1.1rem; }
        .btn-save { background: var(--primary); color: white; }
        .editor { background: #1e293b; color: #10b981; font-family: monospace; height: 200px; direction: ltr; margin-top: 15px; resize: none; }
        #status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 30px; border-radius: 50px; color: white; font-weight: bold; display: none; z-index: 999; }
    </style>
</head>
<body>

<div class="card ai-zone">
    <h3 style="color:var(--ai)">🤖 مولد البرومبت (بنية الاندكس الأصلية)</h3>
    <div class="input-group">
        <input id="lesson" placeholder="اسم الدرس...">
        <select id="level"><option>السادس ابتدائي</option></select>
    </div>
    <button class="btn btn-ai" onclick="generatePrompt()">📋 توليد ونسخ البرومبت</button>
</div>

<div class="card">
    <h3>📦 استيراد بيانات JSON</h3>
    <textarea id="jsonInput" class="editor" placeholder="الصق كود JSON هنا..."></textarea>
    <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
        <button class="btn btn-save" onclick="saveToGame()">💾 حفظ في اللعبة</button>
        <button class="btn" style="background:#64748b; color:white;" onclick="clearAll()">🗑️ مسح</button>
        <a href="index.html" class="btn" style="background:#000; color:white; text-decoration:none;">🎮 رجوع</a>
    </div>
</div>

<div id="status"></div>

<script>
// دالة إظهار الرسائل (تم إصلاحها لتعمل دائماً)
function notify(msg, color = '#10b981') {
    const s = document.getElementById('status');
    s.innerText = msg;
    s.style.background = color;
    s.style.display = 'block';
    setTimeout(() => { s.style.display = 'none'; }, 3000);
}

// دالة التوليد والنسخ (تستخدم بنية rawStock المطابقة للاندكس)
function generatePrompt() {
    const lesson = document.getElementById('lesson').value;
    if(!lesson) { notify('يرجى كتابة اسم الدرس!', '#ef4444'); return; }

    const promptText = `Act as a JSON Generator. Output ONLY a RAW JSON code block.
Task: Create questions for "${lesson}" (Moroccan Level 6).

The JSON must strictly follow this structure:
{
  "phase1Questions": [6 MCQs],
  "phase2Questions": [12 MCQs],
  "rawStock": [12 items as: {"q":"question", "a":"answer", "t":"تراكيب/صرف/إملاء"}],
  "phase4Questions": [4 direct questions]
}

Instructions:
- Use Arabic only.
- Start with \`\`\`json and end with \`\`\`.
- No conversational filler.`;

    // طريقة نسخ مضمونة للمتصفحات
    const tempInput = document.createElement("textarea");
    tempInput.value = promptText;
    document.body.appendChild(tempInput);
    tempInput.select();
    document.execCommand("copy");
    document.body.removeChild(tempInput);

    notify('✅ تم نسخ البرومبت! الصقه في Gemini');
}

function saveToGame() {
    let rawData = document.getElementById('jsonInput').value.trim();
    // تنظيف الكود من علامات الجيسون الزائدة
    rawData = rawData.replace(/```json/g, "").replace(/
```/g, "").trim();
    
    if(!rawData) { notify('الصندوق فارغ!', '#ef4444'); return; }

    try {
        const parsed = JSON.parse(rawData);
        // حفظ في localStorage بالاسم الذي يبحث عنه الاندكس
        localStorage.setItem('moatark_questions', JSON.stringify(parsed));
        notify('💾 تم حفظ الأسئلة بنجاح في ذاكرة المتصفح');
    } catch(e) {
        notify('❌ خطأ في صيغة JSON، تأكد من نسخ الكود كاملاً', '#ef4444');
    }
}

function clearAll() {
    document.getElementById('jsonInput').value = '';
    notify('🗑️ تم إخلاء الصندوق');
}
</script>
</body>
</html>
