<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النهائي الكبير | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --moroccan-blue: #006847; --moroccan-gold: #c5a059; --deep-red: #8b0000; --bg-light: #f4f1ea; }
        body { 
            background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png');
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background: white; border-bottom: 4px solid var(--moroccan-gold); }
        .logo { width: 60px; height: auto; }
        .container { max-width: 900px; margin: 40px auto; text-align: center; padding: 20px; }
        .final-card { background: white; border-radius: 30px; padding: 40px; border-top: 8px solid var(--moroccan-blue); box-shadow: 0 15px 40px rgba(0,0,0,0.1); position: relative; }
        #q-text { font-family: 'Amiri', serif; font-size: clamp(1.5rem, 5vh, 2.5rem); color: var(--moroccan-blue); margin-bottom: 30px; line-height: 1.4; }
        #a-text { font-size: 2rem; color: #10b981; font-weight: 900; display: none; margin-top: 20px; padding: 15px; border: 3px dashed #10b981; border-radius: 15px; }
        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-family: 'Cairo'; font-weight: 900; font-size: 1.1rem; transition: 0.3s; }
        .btn-reveal { background: var(--moroccan-gold); color: white; }
        .btn-next { background: var(--moroccan-blue); color: white; }
        .btn-home { background: var(--deep-red); color: white; position: fixed; top: 110px; right: 20px; padding: 10px; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 0.75rem; color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" class="logo" alt="Logo">
        <h1 style="color: var(--moroccan-blue); margin: 0; font-size: 1.5rem;">⚔️ جولة الحسم النهائي ⚔️</h1>
        <img src="logo-cup.png" class="logo" alt="Cup Logo">
    </header>

    <a href="index.html" class="btn-home" title="العودة للرئيسية">🏠</a>

    <div class="container">
        <div class="final-card">
            <div id="q-counter" style="color: var(--moroccan-gold); font-weight: bold; margin-bottom: 10px;">السؤال 1 / 4</div>
            <div id="q-text">جاري تحميل أسئلة الحسم...</div>
            <div id="a-text"></div>
            
            <div class="controls">
                <button class="btn btn-reveal" onclick="revealAnswer()">👁️ كشف الإجابة</button>
                <button class="btn btn-next" onclick="nextQuestion()">السؤال التالي ➡️</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        من إعداد وتصميم الأستاذ محمد أسرار -مدرسة ميمونة أم المؤمنين-مديرية مراكش-
    </footer>

<script>
    // 1. استرجاع البيانات المحدثة أو استخدام الافتراضية
    const savedData = localStorage.getItem('moatark_questions');
    const questionsData = savedData ? JSON.parse(savedData).phase4 : [
        {q: "ما هو الوزن الصرفي الصحيح لكلمة 'صِـلَة'؟", a: "عِـلَة"},
        {q: "حوّل الفعل 'رأى' إلى فعل أمر للمفرد المذكر.", a: "رَ"},
        {q: "ما هو جمع كلمة 'دَلْو' على وزن 'أَفْعُل'؟", a: "أَدْلٍ"},
        {q: "حوّل الجملة للمثنى المؤنث: (إنَّ التلميذةَ ذكيةٌ).", a: "إنَّ التلميذتَيْنِ ذكيةٌ"}
    ];

    let currentIdx = 0;

    function init() {
        if (!questionsData || questionsData.length === 0) {
            document.getElementById('q-text').innerText = "لا توجد أسئلة حسم متوفرة.";
            return;
        }
        showQuestion();
    }

    function showQuestion() {
        const qObj = questionsData[currentIdx];
        document.getElementById('q-counter').innerText = `السؤال ${currentIdx + 1} / ${questionsData.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        document.getElementById('a-text').innerText = qObj.a;
        document.getElementById('a-text').style.display = 'none';
    }

    function revealAnswer() {
        document.getElementById('a-text').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx >= questionsData.length) {
            if (confirm("انتهت أسئلة الحسم. هل تريد البدء من جديد؟")) {
                currentIdx = 0;
                showQuestion();
            } else {
                location.href = 'index.html';
            }
        } else {
            showQuestion();
        }
    }

    init();
</script>
</body>
</html>
