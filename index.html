<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معترك الضاد - النسخة الاحترافية</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>
:root{
  --primary:#006847;
  --gold:#c5a059;
  --bg:#f4f1ea;
  --card:#fff;
  --text:#222;
  --danger:#ef4444;
  --success:#10b981;
}

body{
  margin:0;
  font-family:'Cairo';
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  background:#fff;
  padding:10px;
  text-align:center;
  border-bottom:4px solid var(--gold);
}

.container{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.card{
  width:95%;
  max-width:800px;
  background:var(--card);
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  text-align:center;
}

#question{
  font-size:1.4rem;
  margin-bottom:15px;
  font-weight:bold;
}

.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button.option{
  padding:12px;
  border:2px solid #ddd;
  border-radius:10px;
  cursor:pointer;
  background:#f8fafc;
  font-weight:bold;
}

button.option:hover{
  border-color:var(--gold);
}

.controls{
  margin-top:15px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-next{background:var(--primary);color:#fff;}
.btn-show{background:var(--gold);}
.btn-reset{background:var(--danger);color:#fff;}

#timer{
  font-size:2rem;
  color:var(--danger);
  margin-bottom:10px;
}

.status{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}
</style></head>
<body><header>
<h2>🎮 معترك الضاد - النسخة الاحترافية</h2>
</header><div class="container">
<div class="card"><div id="timer">--</div>
<div id="question">اضغط بدء</div><div class="options" id="options"></div><div class="controls">
<button class="btn btn-next" onclick="nextQuestion()">التالي</button>
<button class="btn btn-show" onclick="showAnswer()">إظهار الجواب</button>
<button class="btn btn-reset" onclick="resetGame()">إعادة</button>
</div></div>
</div><div class="status" id="status"></div><script>

let current=0;
let timer;
let time=20;
let data=[];

// safe load
try{
  const saved=localStorage.getItem('moatark_questions');
  if(saved){
    const parsed=JSON.parse(saved);
    if(parsed.phase1) data=parsed.phase1;
  }
}catch(e){
  data=[];
}

// fallback
if(data.length===0){
  data=[
    {q:"ما نوع الفعل 'كتب'؟",o:["ماضٍ","مضارع","أمر","مصدر"],a:0},
    {q:"اسم الفاعل من كتب؟",o:["كاتب","مكتوب","كتاب","كتابة"],a:0}
  ];
}

function show(msg){
  const s=document.getElementById('status');
  s.innerText=msg;
  s.style.display='block';
  setTimeout(()=>s.style.display='none',2000);
}

function render(){
  const q=data[current];
  if(!q) return endGame();

  document.getElementById('question').innerText=q.q;

  const box=document.getElementById('options');
  box.innerHTML='';

  q.o.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='option';
    b.innerText=opt;
    b.onclick=()=>check(i);
    box.appendChild(b);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  time=20;
  document.getElementById('timer').innerText=time;

  timer=setInterval(()=>{
    time--;
    document.getElementById('timer').innerText=time;
    if(time<=0){
      clearInterval(timer);
      show('انتهى الوقت');
    }
  },1000);
}

function check(i){
  const q=data[current];
  if(i===q.a) show('✔ صحيح');
  else show('✖ خطأ');
}

function nextQuestion(){
  current++;
  render();
}

function showAnswer(){
  const q=data[current];
  show('الإجابة: '+q.o[q.a]);
}

function resetGame(){
  current=0;
  render();
}

function endGame(){
  document.getElementById('question').innerText='انتهت الأسئلة';
  document.getElementById('options').innerHTML='';
  clearInterval(timer);
}

render();

</script></body>
</html>
