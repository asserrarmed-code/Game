<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #006847; --gold: #c5a059; --bg: #f8fafc; --ai-purple: #7c3aed; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        .admin-header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .main-container { max-width: 900px; margin: 20px auto; padding: 0 20px; }

        .admin-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; }

        .ai-section {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
            border: 2px dashed var(--ai-purple);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        input, select, textarea {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-family: 'Cairo';
        }

        .json-editor {
            width: 100%;
            height: 250px;
            font-family: monospace;
            background: #1e293b;
            color: #10b981;
            border-radius: 10px;
            padding: 12px;
            direction: ltr;
        }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; }

        .btn-ai1 { background: #7c3aed; width: 48%; }
        .btn-ai2 { background: #0ea5e9; width: 48%; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }

        .status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 25px; border-radius: 50px; display: none; color: white; }
    </style>
</head>

<body>

<header class="admin-header">
    <h2>معترك الضاد - لوحة التحكم</h2>
</header>

<div class="main-container">

    <!-- AI PROMPT SECTION -->
    <div class="admin-card ai-section">

        <h3>مولد البرومبت</h3>

        <div class="input-grid">
            <input id="lesson" placeholder="عنوان الدرس">
            <select id="level">
                <option>السادس ابتدائي</option>
                <option>الخامس ابتدائي</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn btn-ai1" onclick="copyPrompt(1)">📋 البرومبت 1</button>
            <button class="btn btn-ai2" onclick="copyPrompt(2)">⚡ البرومبت 2 (صارم)</button>
        </div>

    </div>

    <!-- JSON INPUT -->
    <div class="admin-card">

        <h3>استيراد JSON</h3>

        <textarea id="json"></textarea>

        <div class="btn-group">
            <button class="btn" style="background:#006847" onclick="save()">حفظ</button>
            <button class="btn" style="background:#ef4444" onclick="clearBox()">مسح</button>
        </div>

    </div>

</div>

<div id="status" class="status"></div>

<script>

/* =======================
   PROMPT 1 (الأصلي)
======================= */
function prompt1(lvl, lesson){
return `أنت مولد بيانات JSON فقط للعبة معترك الضاد.

الموضوع: ${lesson}
المستوى: ${lvl}

{
  "phase1": 6 أسئلة MCQ,
  "phase2": 12 أسئلة MCQ,
  "phase4": 4 أسئلة مفتوحة,
  "stock": {
    "المدرسة": 4,
    "المحفظة": 4,
    "الكتاب": 4
  }
}

MCQ: q + o[4] + a(0-3)
OPEN: q + a فقط

JSON فقط بدون شرح`;
}

/* =======================
   PROMPT 2 (صارم جداً)
======================= */
function prompt2(lvl, lesson){
return `أنت مولد JSON صارم جداً.

ممنوع أي نص خارج JSON.

الموضوع: ${lesson}
المستوى: ${lvl}

{
"phase1":[6 MCQ],
"phase2":[12 MCQ],
"phase4":[4 OPEN],
"stock":{
"المدرسة":[4],
"المحفظة":[4],
"الكتاب":[4]
}
}

قواعد:
- phase1/2 MCQ فقط q/o/a
- phase4 + stock = q/a فقط
- a رقم في MCQ (0-3)
- JSON صافي بدون أي شرح`;
}

/* =======================
   COPY
======================= */
function copyPrompt(type){
    const lesson = document.getElementById('lesson').value;
    const lvl = document.getElementById('level').value;

    const text = type === 1 ? prompt1(lvl, lesson) : prompt2(lvl, lesson);

    navigator.clipboard.writeText(text);

    show("تم نسخ البرومبت");
}

/* =======================
   SAVE JSON
======================= */
function save(){
    try {
        const data = JSON.parse(document.getElementById('json').value);
        localStorage.setItem("moatark_questions", JSON.stringify(data));
        show("تم الحفظ");
    } catch {
        show("JSON خطأ", true);
    }
}

function clearBox(){
    document.getElementById('json').value = "";
}

/* =======================
   UI
======================= */
function show(msg, err=false){
    const s = document.getElementById('status');
    s.innerText = msg;
    s.style.background = err ? "#ef4444" : "#10b981";
    s.style.display = "block";
    setTimeout(()=>s.style.display="none", 3000);
}

</script>

</body>
</html>
