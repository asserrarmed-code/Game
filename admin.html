<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التخصيص الذكي | معترك الضاد</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--primary:#006847;
--gold:#c5a059;
--bg:#f8fafc;
--dark:#1e293b;
--ai-purple:#7c3aed;
}

body{
font-family:'Cairo';
background:var(--bg);
margin:0;
}

.admin-header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
border-bottom:4px solid var(--gold);
}

.main-container{
max-width:950px;
margin:auto;
padding:20px;
}

.admin-card{
background:#fff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.btn{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn-copy-ai{background:var(--ai-purple);color:#fff;}
.btn-paste{background:#6366f1;color:#fff;}
.btn-save{background:var(--primary);color:#fff;}

.json-editor{
width:100%;
height:250px;
font-family:monospace;
}
.status{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:10px 20px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<header class="admin-header">
<h2>لوحة التخصيص</h2>
</header>

<div class="main-container">

<div class="admin-card">
<h3>مولد البرومبت</h3>

<input id="lesson" placeholder="الدرس">
<input id="level" value="السادس ابتدائي">

<select id="diff">
<option value="standard">متوسط</option>
<option value="hard">صعب</option>
</select>

<button id="genBtn" class="btn btn-copy-ai" onclick="generate()">توليد ونسخ</button>
</div>

<div class="admin-card">
<textarea id="json" class="json-editor"></textarea>

<div>
<button class="btn btn-paste" onclick="paste()">لصق</button>
<button class="btn btn-save" onclick="save()">حفظ</button>
</div>
</div>

</div>

<div class="status" id="status"></div>

<script>

const btn = document.getElementById("genBtn");

function show(msg){
const s=document.getElementById("status");
s.innerText=msg;
s.style.display="block";
setTimeout(()=>s.style.display="none",2500);
}

// تحسين البرومبت
function generate(){

if(btn.disabled) return;
btn.disabled=true;

const lesson = document.getElementById("lesson").value || "غير محدد";
const level = document.getElementById("level").value;
const diff = document.getElementById("diff").value;

let prompt = `
أنشئ JSON فقط بدون أي شرح.

الدرس: ${lesson}
المستوى: ${level}
الصعوبة: ${diff}

القالب:
{
 "phase1": [],
 "phase2": [],
 "phase4": [],
 "stock": {
   "syntax": [],
   "morphology": [],
   "dictation": []
 }
}
`;

navigator.clipboard.writeText(prompt)
.then(()=>{
show("تم النسخ");
})
.catch(()=>{
show("فشل النسخ");
})
.finally(()=>{
btn.disabled=false;
});

}

// لصق آمن
async function paste(){
try{
const t = await navigator.clipboard.readText();
document.getElementById("json").value = t;
show("تم اللصق");
}catch(e){
show("فشل اللصق");
}
}

// حفظ مع تحقق أقوى
function save(){
try{
const data = JSON.parse(document.getElementById("json").value);

if(
!data.phase1 || !data.phase2 || !data.phase4 || !data.stock
){
show("JSON غير مكتمل");
return;
}

localStorage.setItem("data",JSON.stringify(data));
show("تم الحفظ");

}catch(e){
show("JSON غير صالح");
}
}

</script>

</body>
</html>
