<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مَارَاثُون الضَّاد - النسخة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --moroccan-blue: #006847; 
            --moroccan-gold: #c5a059;
            --deep-red: #8b0000;
            --bg-light: #f4f1ea;
            --card: #ffffff;
            --text: #333;
            --success: #10b981; 
            --danger: #ef4444; 
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --moroccan-gold: #fbbf24;
            --moroccan-blue: #00a873;
        }

        body { 
            background-color: var(--bg-light);
            background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png');
            color: var(--text); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: fixed; top: 15px; left: 15px; z-index: 2000;
            background: var(--moroccan-gold); border: none;
            width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; font-size: 1.5rem; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-top { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; max-width: 1000px; margin: 0 auto; gap: 10px;
        }
        .logo-box { 
            flex-shrink: 0; width: clamp(60px, 10vw, 90px); height: clamp(60px, 10vw, 90px);
            background: white; border-radius: 50%; border: 2px solid var(--moroccan-gold); 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .title-area h1 { font-family: 'Amiri', serif; font-size: clamp(1.5rem, 4vw, 2.5rem); margin: 0; color: var(--moroccan-blue); text-align: center; }

        .container { width: 95%; max-width: 900px; margin: 0 auto; padding-bottom: 250px; }

        .card {
            background: var(--card); padding: clamp(15px, 5vw, 35px); border-radius: 25px; 
            border-top: 8px solid var(--moroccan-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }

        #target-announcer {
            background: var(--danger); color: white; padding: 15px 30px; border-radius: 15px;
            font-weight: 900; font-size: 1.8rem; margin-bottom: 20px; display: none;
        }

        .scoreboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 20px 0; }
        .team-box { background: var(--card); padding: 10px; border-radius: 15px; border: 2px solid #ddd; text-align: center; transition: 0.4s; position: relative;}
        .team-box.active-turn { border-color: var(--danger); border-width: 4px; transform: scale(1.05); }
        
        .lifeline-icons { position: absolute; top: -12px; right: 5px; display: flex; gap: 3px; font-size: 1rem; }
        .lifeline-icons span { background: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 20px 0; }
        .opt, .component-btn { 
            background: #f8fafc; color: #334155; border: 2px solid #e2e8f0; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; transition: 0.3s;
        }
        
        .admin-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; 
            color: white; padding: 10px; border-top: 4px solid var(--moroccan-gold);
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; z-index: 1000;
        }
        .admin-group { border: 1px solid #475569; padding: 5px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .btn-admin { padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; font-size: 0.8rem; }
        .btn-l { padding: 2px 6px; font-size: 0.7rem; border-radius: 3px; }
        .btn-disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        .page-footer-fixed {
            position: fixed; bottom: 120px; left: 0; right: 0; text-align: center;
            font-size: 0.7rem; color: #94a3b8; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <div id="setup-screen" class="container" style="margin-top: 20px;">
        <div class="header-top">
            <div class="logo-box"><img src="logo-cup.png"></div>
            <div class="title-area"><h1>مَارَاثُون الضَّاد</h1></div>
            <div class="logo-box"><img src="logo.png"></div>
        </div>
        <div class="card">
            <h3 style="color: var(--moroccan-blue);">👥 إعداد المجموعات</h3>
            <select id="team-count" onchange="updateTeamInputs(this.value)" style="padding:10px; border-radius:8px;">
                <option value="2">مجموعتان</option>
                <option value="3">ثلاث مجموعات</option>
                <option value="4" selected>أربع مجموعات</option>
            </select>
            <div id="team-names-container" style="margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
            <button class="btn-admin" style="background:var(--moroccan-blue); color:white; padding:15px 50px; font-size:1.2rem; border-radius:50px;" onclick="startMarathon()">انْطَلِقْ 🚀</button>
        </div>
    </div>

    <div id="quiz-screen" class="container" style="display:none; margin-top: 10px;">
        <div id="dynamic-scoreboard" class="scoreboard"></div>
        <div class="card">
            <div id="target-announcer"></div>
            <div id="phase-label" style="background:var(--moroccan-blue); color:white; padding:5px 20px; border-radius:50px; font-size:0.9rem;"></div>
            <div id="timer" style="font-size: 3.5rem; font-weight: 900; color: var(--danger);">15</div>
            <div id="q-text" style="font-size: 1.8rem; margin: 20px 0; font-family:'Amiri'; font-weight: bold;"></div>
            <div id="component-selection" style="display:none; gap:10px; justify-content:center; margin:20px 0;">
                <button class="component-btn" id="btn-تراكيب" onclick="selectComponent('تراكيب')">تراكيب <span id="count-تراكيب"></span></button>
                <button class="component-btn" id="btn-صرف" onclick="selectComponent('صرف')">صرف <span id="count-صرف"></span></button>
                <button class="component-btn" id="btn-إملاء" onclick="selectComponent('إملاء')">إملاء <span id="count-إملاء"></span></button>
            </div>
            <div class="options-grid" id="opt-container"></div>
            <div id="manual-zone" style="display:none;"><div id="manual-answer-display" style="font-size:2rem; color:var(--moroccan-blue); font-weight:bold;">...</div></div>
        </div>
        <div class="admin-panel">
            <div style="display: flex; gap: 5px; align-items: center; border-left: 2px solid #fff; padding-left: 10px;">
                <input type="text" id="answer-input" placeholder="إجابة..." oninput="syncAnswer(this.value)" style="padding:5px; width:80px;">
                <button class="btn-admin" style="background:var(--success); color:white" onclick="reveal()">كشف ✅</button>
                <button class="btn-admin" style="background:var(--moroccan-gold); color:black" onclick="next()">➡️</button>
            </div>
            <div id="admin-score-controls" style="display:flex; gap:8px;"></div>
        </div>
    </div>

    <div class="page-footer-fixed">مِنْ تَصْمِيمِ وَإِعْدَادِ مُحَمَّد أَسْرَار - مَدْرَسَةُ مَيْمُونَة أُمِّ الْمُؤْمِنِينَ</div>

<script>
    let teamNames = [], scores = [], currentPhase = 0, currentQ = 0, timer, phaseTurns = [];
    let votedOnThisQuestion = [], currentMultiplier = 1;
    let teamLifelines = []; 

    const masterStock = { 
        "تراكيب": ["أعرب 'المسافرين' في: وصل المسافرون إلا المسافرين.", "حوّل الجملة 'أن تجتهد خير لك' إلى مصدر مؤول.", "ما هو إعراب 'خمسة' في: اشتريت خمسة أقلام؟"],
        "صرف": ["صغ اسم المكان من فعل 'سجد'.", "ما هو وزن كلمة 'استغفار'؟", "حوّل الفعل 'دعا' إلى اسم فاعل."],
        "إملاء": ["لماذا كتبت الهمزة متطرفة في كلمة 'دفء'؟", "اكتب كلمة 'ابن' في: 'يا ... الأكرمين'.", "كيف تكتب الألف اللينة في فعل 'دنا'؟"]
    };

    const phasesData = [
        { name: "النمط 1: الموحد", type: "all", time: 15, questions: [{q: "إعراب 'خالد' في: جاء خالدٌ؟", o:["فاعل", "مفعول"], a:0}, {q: "نوع الهمزة في 'إخراج'؟", o:["وصل", "قطع"], a:1}]},
        { name: "النمط 2: الموجه", type: "target", time: 15, questions: [{q: "إعراب 'الولدين' في رأيت الولدين؟", o:["مفعول به", "فاعل"], a:0}]},
        { name: "النمط 3: الاختيار الحر", type: "free", time: 15 },
        { name: "النمط 4: السرعة", type: "speed", time: 10, questions: [{q: "إعراب 'لن'؟", o:["نصب", "جزم"], a:0}]}
    ];

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    function updateTeamInputs(count) {
        const container = document.getElementById('team-names-container');
        container.innerHTML = '';
        for(let i=0; i<count; i++) container.innerHTML += `<input type="text" id="tn-${i}" value="المجموعة ${i+1}" style="padding:8px; width:100px; text-align:center;">`;
    }

    function startMarathon() {
        const count = parseInt(document.getElementById('team-count').value);
        teamNames = []; scores = []; teamLifelines = [];
        for(let i=0; i<count; i++) {
            teamNames.push(document.getElementById(`tn-${i}`).value);
            scores.push(0);
            teamLifelines.push({ del: true, dou: true, stp: true });
        }
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        renderInterface();
        prepareTurns();
        init();
    }

    function renderInterface() {
        const sb = document.getElementById('dynamic-scoreboard');
        const adminCtrl = document.getElementById('admin-score-controls');
        sb.innerHTML = ''; adminCtrl.innerHTML = '';
        
        teamNames.forEach((name, i) => {
            sb.innerHTML += `
                <div class="team-box" id="t-card-${i}">
                    <div class="lifeline-icons">
                        <span id="ico-${i}-del">💡</span>
                        <span id="ico-${i}-dou">🚀</span>
                        <span id="ico-${i}-stp">⏱️</span>
                    </div>
                    <span id="s-${i}" style="font-size:1.5rem; font-weight:900;">0</span>
                    <div style="font-size:0.8rem">${name}</div>
                </div>`;
            
            adminCtrl.innerHTML += `
                <div class="admin-group">
                    <div style="font-size:0.6rem; color:var(--moroccan-gold)">${name}</div>
                    <div style="display:flex; gap:2px">
                        <button class="btn-admin" style="background:var(--success); color:white" onclick="modifyScore(${i}, 10)">+10</button>
                        <button class="btn-admin" style="background:var(--danger); color:white" onclick="modifyScore(${i}, -5)">-5</button>
                    </div>
                    <div style="display:flex; gap:2px">
                        <button id="btn-${i}-del" class="btn-admin btn-l" style="background:#8b5cf6; color:white" onclick="useLife(${i}, 'del')">حذف</button>
                        <button id="btn-${i}-dou" class="btn-admin btn-l" style="background:#f59e0b; color:white" onclick="useLife(${i}, 'dou')">ضعف</button>
                        <button id="btn-${i}-stp" class="btn-admin btn-l" style="background:#3b82f6; color:white" onclick="useLife(${i}, 'stp')">وقف</button>
                    </div>
                </div>`;
        });
    }

    function useLife(tid, type) {
        if (!teamLifelines[tid][type]) return;
        
        // إخفاء الأيقونة والزر فوراً
        const icon = document.getElementById(`ico-${tid}-${type}`);
        if(icon) icon.style.display = 'none';
        document.getElementById(`btn-${tid}-${type}`).classList.add('btn-disabled');
        teamLifelines[tid][type] = false;

        if(type === 'del') {
            const opts = document.querySelectorAll('.opt');
            if(opts.length > 1) { opts[0].style.opacity = '0.3'; opts[0].disabled = true; }
            alert("تم حذف إجابة!");
        } else if(type === 'dou') {
            currentMultiplier = 2;
            alert("🚀 تم تفعيل المضاعفة!");
        } else if(type === 'stp') {
            clearInterval(timer); // سطر إيقاف العداد
            alert("⏱️ تم إيقاف العداد!");
        }
    }

    function modifyScore(i, v) {
        if(votedOnThisQuestion[i]) return;
        let points = v * currentMultiplier;
        scores[i] += points;
        document.getElementById(`s-${i}`).innerText = scores[i];
        votedOnThisQuestion[i] = true;
    }

    function prepareTurns() {
        phaseTurns = [];
        const count = teamNames.length;
        if(phasesData[currentPhase].type === 'target') { for(let i=0; i<count; i++) for(let j=0; j<3; j++) phaseTurns.push(i); }
        else if(phasesData[currentPhase].type === 'free') { for(let i=0; i<count; i++) for(let j=0; j<2; j++) phaseTurns.push(i); }
        phaseTurns.sort(() => Math.random() - 0.5);
    }

    function init() {
        votedOnThisQuestion = teamNames.map(() => false);
        currentMultiplier = 1;
        const p = phasesData[currentPhase];
        document.getElementById('phase-label').innerText = p.name;
        document.getElementById('q-text').innerText = '';
        document.getElementById('opt-container').innerHTML = '';
        document.getElementById('component-selection').style.display = 'none';
        document.getElementById('manual-zone').style.display = 'none';
        document.getElementById('answer-input').value = '';
        document.getElementById('target-announcer').style.display = 'none';
        document.querySelectorAll('.team-box').forEach(b => b.classList.remove('active-turn'));
        clearInterval(timer);

        if(p.type === 'target' || p.type === 'free') {
            const tid = phaseTurns[currentQ];
            document.getElementById('target-announcer').style.display = 'block';
            document.getElementById('target-announcer').innerHTML = `🎯 الدور: ${teamNames[tid]}`;
            document.getElementById(`t-card-${tid}`).classList.add('active-turn');
            if(p.type === 'free') showFreeSelection();
            else displayQuestion(p.questions[currentQ % p.questions.length]);
        } else {
            displayQuestion(p.questions[currentQ]);
        }
    }

    function displayQuestion(q) {
        if(!q) return;
        document.getElementById('q-text').innerText = q.q;
        q.o.forEach((opt) => {
            document.getElementById('opt-container').innerHTML += `<button class="opt" onclick="this.style.borderColor='var(--moroccan-blue)'">${opt}</button>`;
        });
        startTimer(phasesData[currentPhase].time);
    }

    function showFreeSelection() {
        document.getElementById('component-selection').style.display = 'flex';
        for(let key in masterStock) document.getElementById(`count-${key}`).innerText = masterStock[key].length;
    }

    function selectComponent(key) {
        document.getElementById('component-selection').style.display = 'none';
        document.getElementById('manual-zone').style.display = 'block';
        document.getElementById('q-text').innerText = `[${key}] ${masterStock[key].shift()}`;
        startTimer(15);
    }

    function startTimer(s) {
        let tl = s; document.getElementById('timer').innerText = tl;
        timer = setInterval(() => { tl--; document.getElementById('timer').innerText = tl; if(tl<=0) clearInterval(timer); }, 1000);
    }

    function reveal() {
        clearInterval(timer);
        document.getElementById('manual-answer-display').style.color = 'var(--success)';
    }

    function next() {
        currentQ++;
        let limit = (phasesData[currentPhase].type === 'target' || phasesData[currentPhase].type === 'free') ? phaseTurns.length : phasesData[currentPhase].questions.length;
        if(currentQ >= limit) { currentQ = 0; currentPhase++; if(currentPhase < phasesData.length) prepareTurns(); }
        if(currentPhase >= phasesData.length) alert("انتهت المسابقة 🏆");
        else init();
    }

    function syncAnswer(v) { document.getElementById('manual-answer-display').innerText = v || '...'; }
    updateTeamInputs(4);
</script>
</body>
</html>
