<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>شاشة العرض - معترك الضاد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow-x: hidden; }
    .container { max-width: 1250px; }
    .card { min-height: 56vh; display: flex; flex-direction: column; justify-content: center; }
    .question-text { font-size: clamp(2rem, 5.8vw, 4.3rem); }
    .opt { font-size: clamp(1.3rem, 3.2vw, 2rem); padding: 22px; }
    .screen-only-note { font-size: clamp(1.1rem, 2.3vw, 1.6rem); font-weight: 900; color: var(--muted); }
  </style>
</head>
<body>

<div class="header-top">
  <div class="logo-box"><img src="logo-cup.png" alt="Logo"></div>
  <div class="title-area"><img src="banner-cup.png" alt="Banner"></div>
  <div class="logo-box"><img src="logo.png" alt="Logo"></div>
</div>

<div class="container">
  <div id="scoreboard" class="scoreboard"></div>

  <div class="card">
    <div id="target" class="target-announcer" style="display:none;"></div>
    <div id="phase" class="badge">في انتظار بدء المسابقة</div>
    <div id="timer" class="timer">⏳</div>
    <div id="question" class="question-text">افتحي لوحة الأستاذ ثم اضغطي: انطلق 🚀</div>
    <div id="options" class="options-grid"></div>
    <div id="answer" style="display:none; font-size:clamp(1.8rem,4vw,3rem); color:var(--success); font-weight:900;"></div>
    <div id="note" class="screen-only-note"></div>
  </div>
</div>

<div class="footer-credit">من إعداد وتصميم الأستاذ محمد أسرار - مدرسة ميمونة أم المؤمنين - مديرية مراكش</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { firebaseConfig, ROOM_ID } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const roomRef = ref(db, `rooms/${ROOM_ID}`);

let currentQuestion = null;
let revealed = false;
let timerInterval = null;

const $ = (id) => document.getElementById(id);

function renderScoreboard(teams = {}, scores = {}, answers = {}) {
  const sb = $("scoreboard");
  sb.innerHTML = "";
  Object.entries(teams).forEach(([id, team]) => {
    const answered = answers && answers[id];
    const active = currentQuestion && (currentQuestion.targetTeam === id || currentQuestion.targetTeam === "all");
    sb.innerHTML += `
      <div class="team-box ${active && currentQuestion.targetTeam !== "all" ? "active-turn" : ""} ${answered ? "answered" : ""}">
        <div class="team-score">${scores[id] ?? 0}</div>
        <div class="team-name">${team.name}</div>
        <div class="small-text">${answered ? "أجاب ✅" : "في الانتظار"}</div>
      </div>
    `;
  });
}

function renderQuestion(q, isRevealed) {
  currentQuestion = q;
  revealed = !!isRevealed;
  $("options").innerHTML = "";
  $("answer").style.display = "none";
  $("note").textContent = "";

  if (!q) {
    $("phase").textContent = "في انتظار المسابقة";
    $("timer").textContent = "⏳";
    $("question").textContent = "افتحي لوحة الأستاذ ثم اضغطي: انطلق 🚀";
    $("target").style.display = "none";
    clearInterval(timerInterval);
    return;
  }

  $("phase").textContent = q.phaseName || "";
  $("question").textContent = q.text || "";
  $("target").style.display = q.targetTeam !== "all" ? "inline-block" : "none";
  $("target").textContent = q.targetTeam !== "all" ? `🎯 الدور: ${q.targetTeamName}` : "";

  if (q.boxMode) {
    $("note").textContent = "الفريق المعني يختار الصندوق من شاشة الأستاذ.";
  }

  if (q.options) {
    q.options.forEach((opt, idx) => {
      const b = document.createElement("button");
      b.className = "opt";
      b.textContent = opt;
      if (revealed && Number(idx) === Number(q.correctIndex)) b.classList.add("correct");
      $("options").appendChild(b);
    });
  }

  if (revealed && q.modelAnswer) {
    $("answer").style.display = "block";
    $("answer").textContent = `الجواب: ${q.modelAnswer}`;
    $("question").textContent = q.text;
  }

  if (revealed && q.options && q.correctIndex !== null) {
    $("note").textContent = `الجواب الصحيح: ${q.options[q.correctIndex]}`;
  }

  startTimer(q.time, q.startedAt, q.phaseType === "speed", revealed);
}

function startTimer(seconds, startedAt, isSpeed, isRevealed) {
  clearInterval(timerInterval);

  function tick() {
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    const left = Math.max(0, seconds - elapsed);
    $("timer").textContent = left;
    if (left <= 5 && left > 0) $("timer").classList.add("urgent");
    else $("timer").classList.remove("urgent");

    if (left <= 0) {
      clearInterval(timerInterval);
      if (isSpeed && !isRevealed) $("question").textContent = "";
    }
  }

  tick();
  timerInterval = setInterval(tick, 1000);
}

onValue(roomRef, (snapshot) => {
  const data = snapshot.val();
  if (!data) {
    renderQuestion(null, false);
    renderScoreboard();
    return;
  }

  if (data.final) {
    clearInterval(timerInterval);
    $("phase").textContent = "النهاية";
    $("timer").textContent = "🏆";
    $("question").textContent = "انتهت المسابقة، شكرًا للمشاركة!";
    $("options").innerHTML = "";
    $("answer").style.display = "none";
    renderScoreboard(data.teams || {}, data.scores || {}, data.answers || {});
    return;
  }

  renderQuestion(data.currentQuestion, data.revealed);
  renderScoreboard(data.teams || {}, data.scores || {}, data.answers || {});
});
</script>
</body>
</html>
