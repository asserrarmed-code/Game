<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معترك الضاد - النهائي الكبير</title>
    <!-- هنا تبقى كافة التنسيقات (CSS) الأصلية الخاصة بك دون تغيير حرف واحد -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* سأضع هنا نفس الـ CSS الذي كان في ملفك الأصلي تماماً */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        /* ... (تكملة كافة الستاييلات الأصلية لصفحتك) ... */
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* التوقيع الثابت أسفل الصفحة كما طلبت */
        .footer-signature {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            color: #2c3e50;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            border-top: 3px solid #e74c3c;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- هنا يبقى هيكل الـ HTML الأصلي الخاص بك (الأنماط الأربعة) -->
    <div class="container">
        <!-- محتوى صفحتك الأصلي: المواجهة الموجهة، المزاد، التحدي، الحسم -->
    </div>

    <div class="footer-signature">
        إعداد وتصميم الأستاذ: محمد أسرار - مدرسة ميمونة أم المؤمنين - مديرية مراكش
    </div>

    <script>
        /* هذا هو الجزء الذي سأحقنه داخل الـ Script الأصلي لربطه بالأدمن */

        // 1. المصفوفات الأصلية (تتركها كاحتياط Fallback)
        let moajahaQuestions = []; 
        let mazadQuestions = [];
        let tahadiQuestions = [];
        let hasmQuestions = [];

        // 2. دالة الجلب الذكي من الأدمن
        function loadDynamicQuestions() {
            const savedData = localStorage.getItem('final_questions');
            if (savedData) {
                const data = JSON.parse(savedData);
                
                // تصفية الأسئلة الـ 17 وتوزيعها على مصفوفاتك الأصلية
                moajahaQuestions = data.filter(q => q.type === 'moajaha');
                mazadQuestions = data.filter(q => q.type === 'mazad');
                tahadiQuestions = data.filter(q => q.type === 'tahadi');
                hasmQuestions = data.filter(q => q.type === 'hasm');
                
                console.log("تم تحديث أسئلة النهائي من لوحة التحكم");
            }
        }

        // استدعاء الجلب عند تحميل الصفحة
        window.onload = () => {
            loadDynamicQuestions();
            // هنا تكملة دوال التشغيل الأصلية الخاصة بك (initGame, etc.)
        };

        /* باقي منطق العمل (الأنماط، الحركة، المؤثرات الصوتية) يبقى كما هو في ملفك الأصلي */
    </script>
</body>
</html>
