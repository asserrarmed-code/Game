<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #006847; --gold: #c5a059; --bg: #f8fafc; --dark: #1e293b; --ai-purple: #7c3aed; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .admin-header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-logo { width: 70px; height: auto; }
        .main-container { max-width: 950px; margin: 20px auto; padding: 0 20px; }
        .admin-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .ai-section { background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); border: 2px dashed var(--ai-purple); }
        
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; gap: 5px; }
        .input-box label { font-weight: bold; color: var(--ai-purple); font-size: 0.85rem; }
        .input-box select, .input-box input { padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-family: 'Cairo'; outline: none; transition: 0.3s; }
        .input-box select:focus, .input-box input:focus { border-color: var(--ai-purple); }

        .json-editor { width: 100%; height: 350px; font-family: 'Courier New', monospace; padding: 15px; border: 2px solid #0f172a; border-radius: 12px; direction: ltr; text-align: left; background: #0f172a; color: #10b981; font-size: 14px; box-sizing: border-box; resize: vertical; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; text-decoration: none; }
        .btn-copy { background: var(--ai-purple); color: white; width: 100%; justify-content: center; font-size: 1.1rem; }
        .btn-save { background: var(--primary); color: white; }
        .btn-clear { background: #ef4444; color: white; }
        .btn-reset { background: #3b82f6; color: white; }
        .btn-home { background: var(--dark); color: white; }
        
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .footer-credit { text-align: center; padding: 20px; color: #94a3b8; font-size: 0.75rem; font-weight: bold; }
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 30px; border-radius: 50px; color: white; display: none; z-index: 10000; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <header class="admin-header">
        <img src="logo.png" class="header-logo" alt="Logo">
        <h2 style="margin:0; color:var(--primary)">⚙️ لوحة التخصيص الذكي</h2>
        <img src="logo-cup.png" class="header-logo" alt="Cup Logo">
    </header>

    <main class="main-container">
        
        <div class="admin-card ai-section">
            <h3 style="margin-top:0; color:var(--ai-purple)">✨ صانع الأسئلة الآلي (The Ultimate Prompt)</h3>
            
            <div class="config-grid">
                <div class="input-box" style="grid-column: span 2;">
                    <label>📚 موضوع الدرس أو الدروس:</label>
                    <input type="text" id="lesson-name" placeholder="مثلاً: المفعول المطلق، همزة القطع...">
                </div>
                <div class="input-box">
                    <label>🎓 المستهدف (يمكن كتابة أكثر من مستوى):</label>
                    <input type="text" id="level" value="السادس ابتدائي" placeholder="مثلاً: الخامس والسادس">
                </div>
                <div class="input-box">
                    <label>📊 درجة الصعوبة:</label>
                    <select id="difficulty">
                        <option value="سهلة ومبسطة جداً">سهل</option>
                        <option value="متوسطة ومناسبة للمستوى العام">متوسط</option>
                        <option value="تحدي قوية للمتميزين">صعب</option>
                        <option value="متدرجة الصعوبة (من السهل جداً إلى التحدي)">متدرج الصعوبة</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>🔢 عدد أسئلة المرحلة الثانية:</label>
                    <input type="number" id="q-count" value="12" min="6" max="30">
                </div>
                <div class="input-box">
                    <label>📦 أسئلة الصناديق (لكل مجموعة):</label>
                    <input type="number" id="stock-count" value="4" min="2" max="10">
                </div>
            </div>

            <button class="btn btn-copy" onclick="copyPrompt()">📋 نسخ البرومبت الأقصى للذكاء الاصطناعي</button>
        </div>

        <div class="admin-card">
            <label style="display:block; margin-bottom:10px; font-weight:bold;">📦 محرر المحتوى (ألصق كود JSON هنا):</label>
            <textarea id="json-editor" class="json-editor" spellcheck="false" placeholder="ألصق كود JSON الناتج من الذكاء الاصطناعي هنا..."></textarea>
            
            <p style="font-size: 0.75rem; color: #64748b; margin-top: 8px; border-right: 3px solid #cbd5e1; padding-right: 10px;">
                ⚠️ هذا المولد يعتمد على الذكاء الاصطناعي، قد تقع أخطاء لغوية أحياناً. يرجى مراجعة الأسئلة وتعديلها يدوياً إذا لزم الأمر قبل الحفظ.
            </p>

            <div class="btn-group">
                <button class="btn btn-save" onclick="saveData()">💾 حفظ واعتماد الأسئلة</button>
                <button class="btn btn-clear" onclick="clearEditor()">🗑️ تفريغ المحرر</button>
                <button class="btn btn-reset" onclick="resetData()">🔄 استعادة الافتراضي</button>
                <a href="index.html" class="btn btn-home">🎮 دخول المسابقة</a>
            </div>
        </div>

        <footer class="footer-credit">
            من إعداد وتصميم الأستاذ محمد أسرار -مدرسة ميمونة أم المؤمنين-مديرية مراكش-
        </footer>
    </main>

    <div id="toast" class="status-toast"></div>

<script>
    const defaultData = {
        phase1: [{q: "مثال: نوع الفعل شَدَّ؟", o:["سالم", "مهموز", "مضعف"], a:2}],
        phase2: [{q: "مثال: إعراب المسافرون؟", o:["مفعول", "فاعل", "مبتدأ"], a:1}],
        phase4: [{q: "مثال: وزن صلة؟", a: "علة"}],
        stock: { "Group_A": [], "Group_B": [], "Group_C": [] }
    };

    function copyPrompt() {
        const lesson = document.getElementById('lesson-name').value || "(موضوع لغوي عام)";
        const level = document.getElementById('level').value;
        const diff = document.getElementById('difficulty').value;
        const qCount = document.getElementById('q-count').value;
        const sCount = document.getElementById('stock-count').value;

        const promptText = `أنت الآن "اللجنة العلمية الرقمية" المختصة بالمنهاج المغربي المنقح. 
مهمتك: توليد حزمة أسئلة للمستوى [${level}] حول درس [${lesson}] بصعوبة [${diff}].

القواعد الصارمة للجودة:
1. المرجعية: التزم بالقواعد الصريحة في المنهاج المغربي وقاموس اللغة المناسب للمستوى [${level}].
2. التشكيل التام: قم بتشكيل الكلمات المفتاحية وأواخر الكلمات في السؤال والخيارات لرفع أي لبس.
3. الجواب القاطع: يمنع توليد أسئلة تحتمل أكثر من جواب. كل سؤال له جواب واحد صحيح فقط.
4. المشوشات: اجعل الخيارات الخاطئة ذكية وتستهدف الأخطاء الشائعة للمتعلمين.
5. الهوية المغربية: استخدم جمل مفيدة ومحفزة مستوحاة من القيم والبيئة المغربية.

التقسيم المطلوب في كود JSON:
- "phase1": (6) أسئلة خيارات تمهيدية.
- "phase2": (${qCount}) سؤال خيارات للمسابقة.
- "phase4": (4) أسئلة حسم نهائي (سؤال وجواب نصي دقيق وقصير جداً).
- "stock": وزع الأسئلة على 3 مجموعات مجهولة النوع (Group_A, Group_B, Group_C) بحيث تحتوي كل مجموعة على ${sCount} أسئلة متنوعة (فهم، تحويل، إعراب).

أجب بكود JSON فقط، مرتب ومضغوط، لا تكتب حرفاً واحداً خارج الكود:
{
  "phase1": [{"q": "", "o": [], "a": 0}],
  "phase2": [],
  "phase4": [],
  "stock": { "Group_A": [], "Group_B": [], "Group_C": [] }
}`;

        const ta = document.createElement("textarea"); ta.value = promptText;
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast("📋 تم نسخ البرومبت الأقصى بنجاح!", "#7c3aed");
    }

    function saveData() {
        try {
            const data = JSON.parse(document.getElementById('json-editor').value);
            localStorage.setItem('moatark_questions', JSON.stringify(data));
            showToast("✅ تم الحفظ والاعتماد بنجاح!", "#006847");
        } catch(e) { alert("❌ خطأ في تنسيق JSON! تأكد من لصق الكود كاملاً."); }
    }

    function clearEditor() { if(confirm("هل تريد تفريغ المحرر؟")) { document.getElementById('json-editor').value = ""; } }

    function resetData() {
        if(confirm("استعادة الأسئلة الافتراضية الأصلية؟")) {
            localStorage.removeItem('moatark_questions');
            loadData();
            showToast("🔄 تم استعادة البيانات الأصلية", "#3b82f6");
        }
    }

    function loadData() {
        const saved = localStorage.getItem('moatark_questions');
        document.getElementById('json-editor').value = JSON.stringify(saved ? JSON.parse(saved) : defaultData, null, 4);
    }

    function showToast(msg, color) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.style.backgroundColor = color;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    window.onload = loadData;
</script>
</body>
</html>
