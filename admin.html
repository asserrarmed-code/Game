<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التخصيص الذكي | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #006847; --gold: #c5a059; --bg: #f8fafc; --dark: #1e293b; --ai-purple: #7c3aed; --warn: #fffbeb; --warn-border: #fef3c7; --warn-text: #92400e; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .admin-header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .header-logo { width: 70px; }
        .main-container { max-width: 950px; margin: 20px auto; padding: 0 20px; }.notice-card { background: var(--warn); border: 1px solid var(--warn-border); border-right: 5px solid var(--gold); padding: 15px 20px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 15px; }
    .notice-text { font-size: 0.9rem; color: var(--warn-text); font-weight: 600; }

    .admin-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    .ai-section { background: linear-gradient(135deg, #f5f3ff, #ede9fe); border: 2px dashed var(--ai-purple); }

    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .input-box { display: flex; flex-direction: column; gap: 5px; }
    .input-box label { font-weight: bold; color: var(--ai-purple); font-size: 0.85rem; }
    .input-box input, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-family: 'Cairo'; }

    .ai-selector { display: flex; gap: 15px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }

    .json-editor { width: 100%; height: 320px; font-family: monospace; padding: 15px; border-radius: 12px; background: #0f172a; color: #10b981; direction: ltr; }

    .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
    .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
    .btn-copy { background: var(--ai-purple); color: white; width: 100%; margin-bottom: 10px; }
    .btn-save { background: var(--primary); color: white; }
    .btn-clear { background: #ef4444; color: white; }
    .btn-reset { background: #3b82f6; color: white; }
    .btn-home { background: var(--dark); color: white; text-decoration:none; display:flex; align-items:center; justify-content:center; }

    .prompt-box { width:100%; height:200px; margin-top:10px; font-family:monospace; direction:ltr; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }

    .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 12px 25px; border-radius: 30px; display:none; z-index: 10001; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

    @media(max-width:768px){
        .config-grid{grid-template-columns:1fr;}
        .admin-header{flex-direction:column; gap:10px; text-align: center;}
    }
</style>
</head>
<body>

<header class="admin-header">
    <img src="logo.png" class="header-logo">
    <h2>⚙️ لوحة التخصيص الذكي</h2>
    <img src="logo-cup.png" class="header-logo">
</header>

<div class="main-container">
    <div class="notice-card">
        <span>⚠️</span>
        <p class="notice-text">التعديلات تُحفظ محلياً في المتصفح. قم بتوليد البرومبت، انسخه لـ AI، ثم الصق النتيجة في مربع JSON بالأسفل.</p>
    </div>

    <div class="admin-card ai-section">
        <h3 style="color:var(--ai-purple)">✨ مولّد البرومبت الاحترافي</h3>

        <div class="config-grid">
            <div class="input-box">
                <label>📚 موضوع الدرس</label>
                <input id="lesson" placeholder="مثلاً: المفعول المطلق">
            </div>

            <div class="input-box">
                <label>🎓 المستوى الدراسي</label>
                <input id="level" value="السادس ابتدائي">
            </div>

            <div class="input-box">
                <label>📊 درجة الصعوبة</label>
                <select id="diff">
                    <option value="standard">متوسط</option>
                    <option value="hard">تحدي للأذكياء</option>
                </select>
            </div>

            <div class="input-box">
                <label>🤖 ذكاء اصطناعي</label>
                <select id="ai">
                    <option value="gemini">Google Gemini</option>
                    <option value="gpt">ChatGPT</option>
                </select>
            </div>
        </div>

        <button class="btn btn-copy" onclick="generatePrompt()">📋 توليد ونسخ البرومبت</button>
        <textarea id="prompt" class="prompt-box" readonly placeholder="سيظهر البرومبت هنا..."></textarea>
    </div>

    <div class="admin-card">
        <h3 style="color:var(--primary)">📦 بنك أسئلة JSON</h3>
        <textarea id="json" class="json-editor" placeholder="أدخل كود JSON الناتج هنا..."></textarea>

        <div class="btn-group">
            <button class="btn btn-save" onclick="save()">💾 حفظ الأسئلة</button>
            <button class="btn btn-clear" onclick="clearBox()">🗑️ تفريغ الصندوق</button>
            <button class="btn btn-reset" onclick="reset()">🔄 المسابقة الافتراضية</button>
            <a class="btn btn-home" href="index.html">🎮 عودة للمسابقة</a>
        </div>
    </div>
</div>

<div class="status" id="status"></div>

<script>
const schemaKeys = ["phase1", "phase2", "phase4", "stock"];

function show(msg, isError = false){
    const s = document.getElementById('status');
    s.innerText = msg;
    s.style.display = 'block';
    s.style.background = isError ? '#ef4444' : '#10b981';
    setTimeout(() => s.style.display = 'none', 3000);
}

function generatePrompt(){
    const lesson = document.getElementById('lesson').value;
    const level = document.getElementById('level').value;
    const diff = document.getElementById('diff').value;
    const ai = document.getElementById('ai').value;

    if(!lesson) { show('⚠️ يرجى كتابة اسم الدرس أولاً', true); return; }

    let p = `أنت خبير تربوي مغربي متخصص في اللغة العربية. قم بتوليد بنك أسئلة JSON لدرس "${lesson}" للمستوى "${level}" بصعوبة "${diff}".
يجب أن يكون الناتج JSON فقط بدون أي مقدمات أو شرح.

الهيكل المطلوب بدقة (34 سؤالاً):
1. "phase1": [6 أسئلة اختيار من متعدد، 4 اختيارات في مصفوفة o، والجواب a هو رقم من 0-3]
2. "phase2": [12 سؤالاً اختيار من متعدد، بنفس تنسيق phase1]
3. "phase4": [4 أسئلة مباشرة، q للسؤال و a للجواب النصي]
4. "stock": {
      "تراكيب": [4 أسئلة مباشرة q و a نصي],
      "صرف": [4 أسئلة مباشرة q و a نصي],
      "إملاء": [4 أسئلة مباشرة q و a نصي]
   }

شروط تقنية:
- اللغة العربية الفصيحة.
- الالتزام بالأعداد (6، 12، 4، 12 للمخزون).
- الناتج يكون Valid JSON حصراً.`;

    if(ai === 'gemini') p = "STRICTLY OUTPUT VALID JSON ONLY\n" + p;

    document.getElementById('prompt').value = p;
    navigator.clipboard.writeText(p).then(() => {
        show('✅ تم توليد البرومبت ونسخه بنجاح');
    });
}

function save(){
    const jsonArea = document.getElementById('json');
    const content = jsonArea.value.trim();
    
    if(!content) { show('❌ الصندوق فارغ! يرجى لصق الـ JSON أولاً', true); return; }

    try {
        const d = JSON.parse(content);
        const keys = Object.keys(d);
        const isValid = schemaKeys.every(k => keys.includes(k));

        if(isValid) {
            localStorage.setItem('moatark_questions', JSON.stringify(d));
            show('💾 تم حفظ بنك الأسئلة بنجاح في المتصفح');
        } else {
            show('⚠️ تنبيه: الملف ينقصه بعض الأنماط الأساسية (Phase1, Phase2, Phase4, Stock)', true);
        }
    } catch(e) {
        show('❌ خطأ: الكود الذي لصقته ليس ملف JSON صحيح', true);
    }
}

function clearBox() {
    if(confirm('هل تريد فعلاً مسح النص في الصندوق؟')) {
        document.getElementById('json').value = '';
        show('🗑️ تم تفريغ الصندوق');
    }
}

function reset() {
    if(confirm('هل تريد مسح الأسئلة المخصصة والعودة لأسئلة المسابقة الافتراضية؟')) {
        localStorage.removeItem('moatark_questions');
        show('🔄 تمت العودة للوضع الافتراضي بنجاح');
    }
}
</script>

</body>
</html>
