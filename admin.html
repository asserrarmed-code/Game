<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مُعترك الضاد: مَلحمة الظواهر اللغوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; max-width: 100%; }
        :root {
            --moroccan-blue: #006847;
            --moroccan-gold: #c5a059;
            --deep-red: #8b0000;
            --bg-light: #f4f1ea;
            --card: #ffffff;
            --text: #333;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { margin:0; font-family:'Cairo'; background:var(--bg-light); color:var(--text); }

        .admin-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            padding: 15px;
            display:flex;
            gap:10px;
            justify-content:center;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 10px;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        .ai1 { background:#7c3aed; color:white; }
        .ai2 { background:#0ea5e9; color:white; }

        textarea {
            width:100%;
            height:200px;
        }
    </style>
</head>

<body>

<div style="padding:20px;">
    <h2>لوحة التحكم</h2>

    <input id="lesson_title" placeholder="عنوان الدرس">
    <br><br>
    <select id="lesson_level">
        <option>السادس ابتدائي</option>
        <option>الخامس ابتدائي</option>
    </select>

    <br><br>

    <textarea id="json_input"></textarea>
</div>

<!-- زرارين فقط بدون تغيير تصميمك -->
<div class="admin-panel">
    <button class="btn ai1" onclick="generateAndCopy(1)">📋 البرومبت 1</button>
    <button class="btn ai2" onclick="generateAndCopy(2)">⚡ البرومبت 2</button>
</div>

<script>

function buildPrompt(lesson, level){
return `أنت مولد بيانات JSON للعبة معترك الضاد.

الموضوع: ${lesson}
المستوى: ${level}

{
 "phase1": 6,
 "phase2": 12,
 "phase4": 4,
 "stock": {
   "المدرسة": 4,
   "المحفظة": 4,
   "الكتاب": 4
 }
}

MCQ: q + o[4] + a(0-3)
OPEN: q + a
JSON فقط`;
}

/* ===== البرومبت الثاني ===== */
function buildPrompt2(lesson, level){
return `أنت مولد JSON صارم جداً.

ممنوع أي نص خارج JSON.

الموضوع: ${lesson}
المستوى: ${level}

{
"phase1":[6 MCQ],
"phase2":[12 MCQ],
"phase4":[4 OPEN],
"stock":{
"المدرسة":[4],
"المحفظة":[4],
"الكتاب":[4]
}
}

قواعد:
- JSON فقط
- بدون شرح
- بدون markdown
- كل إجابة صحيحة 100%`;
}

/* ===== اختيار البرومبت ===== */
async function generateAndCopy(type){
    const lesson = document.getElementById('lesson_title').value;
    const level = document.getElementById('lesson_level').value;

    const prompt = type === 1
        ? buildPrompt(lesson, level)
        : buildPrompt2(lesson, level);

    await navigator.clipboard.writeText(prompt);
    alert("تم نسخ البرومبت");
}

</script>

</body>
</html>
