<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم السحابية - معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #006847; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--g); }
        h2 { color: var(--p); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; font-size: 16px; }
        .btn { padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; transition: 0.3s; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gen { background: #7c3aed; width: 100%; font-size: 18px; }
        .btn-save { background: var(--p); flex: 2; }
        .btn-paste { background: #3b82f6; flex: 1; }
        .btn-clear { background: #ef4444; }
        .status { position: fixed; top: 20px; right: 20px; padding: 15px 30px; border-radius: 12px; color: white; font-weight: bold; display: none; z-index: 10000; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        textarea { height: 180px; background: #f9f9f9; font-family: monospace; direction: ltr; }
        .flex-btns { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="status" class="status"></div>

<div class="container">
    <div class="card">
        <h2>📝 إعداد الدرس الجديد</h2>
        <input type="text" id="lesson" placeholder="ما هو عنوان الدرس؟ (مثلاً: الأسماء الخمسة)">
        <select id="level">
            <option>المستوى السادس ابتدائي</option>
            <option>المستوى الخامس ابتدائي</option>
        </select>
        <button class="btn btn-gen" onclick="generatePrompt()">🚀 توليد ونسخ البرومبت لـ AI</button>
    </div>

    <div class="card">
        <h2>📥 استيراد بيانات JSON</h2>
        <textarea id="jsonInput" placeholder="بمجرد الحصول على الكود من AI، اضغط على لصق هنا..."></textarea>
        <div class="flex-btns">
            <button class="btn btn-paste" onclick="pasteCode()">📋 لصق</button>
            <button class="btn btn-save" onclick="saveData()">💾 حفظ نهائي</button>
            <button class="btn btn-clear" onclick="clearAll()">🗑️</button>
        </div>
        <div style="margin-top: 20px;">
            <a href="index.html" style="color: var(--p); font-weight: bold; text-decoration: none;">🏠 العودة للرئيسية</a>
        </div>
    </div>
</div>

<script>
    function notify(msg, type = 'success') {
        const s = document.getElementById('status');
        s.innerText = msg;
        s.style.background = type === 'success' ? '#10b981' : '#ef4444';
        s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 4000);
    }

    // دالة التوليد المتوافقة مع GitHub HTTPS
    async function generatePrompt() {
        const lesson = document.getElementById('lesson').value;
        if(!lesson) return notify('⚠️ فضلاً اكتب عنوان الدرس', 'error');

        const promptText = `قم بتوليد ملف JSON لدرس "${lesson}". الأقسام المطلوبة: phase1 (6 أسئلة)، phase2 (12 سؤال)، phase4 (4 أسئلة)، و stock يحتوي على (المدرسة، المحفظة، الكتاب). تأكد أن الإجابة الصحيحة a هي رقم من 0 إلى 3. أجب بالكود فقط.`;

        try {
            await navigator.clipboard.writeText(promptText);
            notify('✅ تم النسخ! اذهب لـ Gemini والصق البرومبت');
        } catch (err) {
            // حل احتياطي في حال فشل navigator.clipboard
            const t = document.createElement("textarea");
            t.value = promptText;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            notify('✅ تم النسخ (طريقة احتياطية)');
        }
    }

    // دالة اللصق الحديثة لـ GitHub
    async function pasteCode() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('jsonInput').value = text;
            notify('📋 تم اللصق من الحافظة');
        } catch (err) {
            notify('⚠️ يرجى اللصق يدوياً Ctrl+V', 'error');
        }
    }

    function saveData() {
        let raw = document.getElementById('jsonInput').value.trim();
        if(!raw) return notify('❌ لا يوجد كود للصقه', 'error');

        try {
            // تنظيف الكود من أي زوائد نصية قد يضعها AI
            const clean = raw.replace(/```json/g, "").replace(/
```/g, "").trim();
            const parsed = JSON.parse(clean);
            
            // الحفظ في التخزين المتصفح
            localStorage.setItem('moatark_questions', JSON.stringify(parsed));
            notify('💾 تم حفظ الدرس بنجاح في متصفحك');
        } catch (e) {
            notify('❌ خطأ في تنسيق JSON.. تأكد من نسخ الكود كاملاً', 'error');
        }
    }

    function clearAll() {
        document.getElementById('jsonInput').value = '';
        notify('🗑️ تم تنظيف الصندوق');
    }
</script>
</body>
</html>
