<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #006847; --gold: #c5a059; --bg: #f8fafc; --dark: #1e293b; --ai-purple: #7c3aed; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--dark); text-align: center; }
        .admin-header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .header-logo { width: 60px; }
        .main-container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .admin-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .ai-section { background: linear-gradient(135deg, #f5f3ff, #ede9fe); border: 2px dashed var(--ai-purple); }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; text-align: right; }
        .input-box { display: flex; flex-direction: column; gap: 5px; }
        .input-box label { font-weight: bold; color: var(--ai-purple); font-size: 0.85rem; }
        .input-box input, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-family: 'Cairo'; outline: none; }
        .json-editor { width: 100%; height: 250px; font-family: monospace; padding: 15px; border-radius: 12px; background: #0f172a; color: #10b981; direction: ltr; border:none; margin-top: 10px; resize: none; }
        .btn { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn-copy-ai { background: var(--ai-purple); color: white; width: 100%; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-paste { background: #6366f1; color: white; }
        .btn-save { background: var(--primary); color: white; }
        .btn-clear { background: #ef4444; color: white; }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 12px 25px; border-radius: 30px; display:none; z-index: 10001; font-weight: bold; }
        footer { text-align: center; padding: 20px; color: #64748b; font-size: 0.8rem; border-top: 1px solid #e2e8f0; margin-top: 30px; }
    </style>
</head>
<body>

<header class="admin-header">
    <img src="logo.png" class="header-logo">
    <h2 style="margin:0">⚙️ لوحة التخصيص الذكي</h2>
    <img src="logo-cup.png" class="header-logo">
</header>

<div class="main-container">
    <!-- قسم توليد البرومبت القهري -->
    <div class="admin-card ai-section">
        <h3 style="color:var(--ai-purple); margin:0 0 15px 0;">✨ مولّد البرومبت القهري (JSON المباشر)</h3>
        <div class="config-grid">
            <div class="input-box"><label>📚 الدرس</label><input id="lesson" placeholder="مثلاً: التمييز"></div>
            <div class="input-box"><label>🎓 المستوى</label><input id="level" value="السادس ابتدائي"></div>
        </div>
        <button class="btn btn-copy-ai" onclick="generateAndCopy()">📋 توليد ونسخ الأمر (سيظهر ملف JSON فوراً)</button>
        <p style="font-size: 0.75rem; color: #6d28d9; margin: 5px 0 0 0;">سيتم نسخ أمر يجبر AI على إعطائك كود JSON صافي دون مقدمات.</p>
    </div>

    <!-- قسم استقبال البيانات -->
    <div class="admin-card">
        <h3 style="color:var(--primary); margin:0 0 10px 0;">📦 استيراد الأسئلة</h3>
        <textarea id="json" class="json-editor" placeholder="الصق الكود الناتج هنا..."></textarea>
        <div class="btn-group" style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
            <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 لصق ذكي (Paste)</button>
            <button class="btn btn-save" onclick="save()">💾 حفظ في المسابقة</button>
            <button class="btn btn-clear" onclick="clearBox()">🗑️ تفريغ</button>
            <a class="btn" style="background:var(--dark); color:white; text-decoration:none;" href="index.html">🎮 خروج</a>
        </div>
    </div>
</div>

<footer>من إعداد وتصميم: الأستاذ محمد أسرار - مدرسة ميمونة أم المؤمنين - مديرية مراكش</footer>

<div class="status" id="status"></div>

<script>
function show(msg, isError = false){
    const s = document.getElementById('status');
    s.innerText = msg; s.style.display = 'block';
    s.style.background = isError ? '#ef4444' : '#10b981';
    setTimeout(() => s.style.display = 'none', 3000);
}

// البرومبت المطور لإجبار AI على وضع الرد في Code Block فوراً
function generateAndCopy(){
    const lesson = document.getElementById('lesson').value;
    const level = document.getElementById('level').value;
    if(!lesson) { show('⚠️ يرجى كتابة اسم الدرس', true); return; }

    const p = `Act as a pure JSON data server. 
Your response must be ONLY a single JSON code block.
No conversational text. No intro. No greeting. 

Task: Generate 34 questions for the lesson "${lesson}" (Level: ${level}) in Moroccan Arabic curriculum.

Structure:
{
  "phase1": [6 MCQs],
  "phase2": [12 MCQs],
  "phase4": [4 direct questions],
  "stock": {
    "تراكيب": [4 questions],
    "صرف": [4 questions],
    "إملاء": [4 questions]
  }
}

Important: Start your response with \`\`\`json and end with \`\`\`. 
Zero prose output.`;

    // عملية النسخ الحديثة التي تعمل بدون textarea مرئي
    navigator.clipboard.writeText(p).then(() => {
        show('✅ تم نسخ البرومبت! الصقه في جيميناي وستحصل على ملف JSON مباشرة.');
    }).catch(() => {
        show('❌ فشل النسخ التلقائي، جرب متصفحاً آخر', true);
    });
}

async function pasteFromClipboard() {
    try {
        let text = await navigator.clipboard.readText();
        // تنظيف تلقائي للعلامات البرمجية التي يضعها AI
        text = text.replace(/```json/g, "").replace(/
```/g, "").trim();
        document.getElementById('json').value = text;
        show('📋 تم اللصق والتنظيف بنجاح');
    } catch (err) {
        show('❌ فشل اللصق، يرجى استخدام Ctrl+V', true);
    }
}

function save(){
    let content = document.getElementById('json').value.trim();
    if(!content) return;
    try {
        const d = JSON.parse(content);
        localStorage.setItem('moatark_questions', JSON.stringify(d));
        show('💾 تم الحفظ بنجاح! اذهب للعبة الآن.');
    } catch(e) {
        show('❌ خطأ: الكود ليس ملف JSON صحيح!', true);
    }
}

function clearBox() { document.getElementById('json').value = ''; }
</script>
</body>
</html>
