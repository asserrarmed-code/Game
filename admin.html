<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة معترك الضاد</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { width: 90%; height: 100px; margin: 10px 0; border: 2px solid #ccc; padding: 10px; font-family: monospace; }
        button { padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; border: none; border-radius: 5px; color: white; }
        .bg-purple { background: #7c3aed; }
        .bg-green { background: #006847; }
        .bg-red { background: #ef4444; }
    </style>
</head>
<body>

    <div class="box">
        <h2>1. استخراج البرومبت</h2>
        <input type="text" id="lesson_name" placeholder="اسم الدرس" style="padding:10px; width:80%;">
        <button class="bg-purple" onclick="copyPrompt()">نسخ البرومبت</button>
        <p id="msg1" style="color: blue;"></p>
    </div>

    <br>

    <div class="box">
        <h2>2. حفظ الكود القادم من AI</h2>
        <textarea id="json_data" placeholder="الصق الكود هنا"></textarea>
        <br>
        <button class="bg-green" onclick="saveData()">💾 حفظ في اللعبة</button>
        <button class="bg-red" onclick="document.getElementById('json_data').value=''">مسح</button>
        <p id="msg2" style="color: green;"></p>
        <br>
        <a href="index.html">الرجوع للعبة</a>
    </div>

    <script>
        // دالة النسخ التقليدية جداً
        function copyPrompt() {
            var lesson = document.getElementById('lesson_name').value;
            if(!lesson) { alert("اكتب الدرس"); return; }
            var text = "أجب بصيغة JSON فقط لدرس " + lesson + ". الأقسام: phase1, phase2, phase4, stock. أجب بالكود فقط.";
            
            var temp = document.createElement("textarea");
            document.body.appendChild(temp);
            temp.value = text;
            temp.select();
            document.execCommand("copy"); // الطريقة القديمة المضمونة
            document.body.removeChild(temp);
            
            document.getElementById('msg1').innerText = "✅ تم النسخ! اذهب لـ Gemini";
        }

        // دالة الحفظ المباشرة
        function saveData() {
            var raw = document.getElementById('json_data').value;
            if(!raw) { alert("الصندوق فارغ"); return; }
            
            try {
                // تنظيف يدوي بسيط
                var clean = raw.replace(/```json/g, "").replace(/
```/g, "").trim();
                var obj = JSON.parse(clean);
                
                // الحفظ في المستودع الذي يقرأ منه الاندكس
                localStorage.setItem('moatark_questions', JSON.stringify(obj));
                
                document.getElementById('msg2').innerText = "💾 تم الحفظ بنجاح!";
                alert("تم الحفظ! يمكنك الآن فتح اللعبة");
            } catch (e) {
                alert("خطأ: الكود الذي لصقته ليس JSON صحيحاً");
            }
        }
    </script>
</body>
</html>
