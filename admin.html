<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التخصيص الذكي | معترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #006847; --gold: #c5a059; --bg: #f8fafc; --dark: #1e293b; --ai-purple: #7c3aed; --warn: #fffbeb; --warn-border: #fef3c7; --warn-text: #92400e; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .admin-header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .header-logo { width: 70px; }
        .main-container { max-width: 950px; margin: 20px auto; padding: 0 20px; }
        .notice-card { background: var(--warn); border: 1px solid var(--warn-border); border-right: 5px solid var(--gold); padding: 15px 20px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 15px; }
        .notice-text { font-size: 0.9rem; color: var(--warn-text); font-weight: 600; }
        .admin-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .ai-section { background: linear-gradient(135deg, #f5f3ff, #ede9fe); border: 2px dashed var(--ai-purple); text-align: center; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; text-align: right; }
        .input-box { display: flex; flex-direction: column; gap: 5px; }
        .input-box label { font-weight: bold; color: var(--ai-purple); font-size: 0.85rem; }
        .input-box input, select { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-family: 'Cairo'; }
        .json-editor { width: 100%; height: 300px; font-family: monospace; padding: 15px; border-radius: 12px; background: #0f172a; color: #10b981; direction: ltr; margin-top: 10px; border:none; resize: vertical; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-copy-ai { background: var(--ai-purple); color: white; font-size: 1.1rem; padding: 15px 30px; width: auto; min-width: 250px; }
        .btn-paste { background: #6366f1; color: white; } /* لون أزرق مميز للّصق */
        .btn-save { background: var(--primary); color: white; }
        .btn-clear { background: #ef4444; color: white; }
        .btn-reset { background: #3b82f6; color: white; }
        .btn-home { background: var(--dark); color: white; text-decoration:none; display:flex; align-items:center; justify-content:center; }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 12px 25px; border-radius: 30px; display:none; z-index: 10001; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        footer { text-align: center; padding: 20px; color: #64748b; font-size: 0.8rem; border-top: 1px solid #e2e8f0; margin-top: 30px; }
        @media(max-width:768px){ .config-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>

<header class="admin-header">
    <img src="logo.png" class="header-logo">
    <h2>⚙️ لوحة التخصيص الذكي</h2>
    <img src="logo-cup.png" class="header-logo">
</header>

<div class="main-container">
    <div class="notice-card">
        <span>💡</span>
        <p class="notice-text">الآن العملية أسهل: ولّد البرومبت، اذهب لـ AI، ثم عد هنا واضغط "لصق" مباشرة!</p>
    </div>

    <div class="admin-card ai-section">
        <h3 style="color:var(--ai-purple); margin-top:0;">✨ مولّد البرومبت السريع</h3>
        <div class="config-grid">
            <div class="input-box">
                <label>📚 موضوع الدرس</label>
                <input id="lesson" placeholder="مثلاً: التوكيد">
            </div>
            <div class="input-box">
                <label>🎓 المستوى الدراسي</label>
                <input id="level" value="السادس ابتدائي">
            </div>
            <div class="input-box">
                <label>📊 درجة الصعوبة</label>
                <select id="diff">
                    <option value="standard">متوسط</option>
                    <option value="hard">تحدي للأذكياء</option>
                </select>
            </div>
            <div class="input-box">
                <label>🤖 نوع الذكاء الاصطناعي</label>
                <select id="ai">
                    <option value="gemini">Google Gemini</option>
                    <option value="gpt">ChatGPT</option>
                </select>
            </div>
        </div>
        <!-- تم إخفاء textarea البرومبت ووضع الزر فقط -->
        <button class="btn btn-copy-ai" onclick="generateAndCopy()">📋 توليد ونسخ البرومبت فوراً</button>
    </div>

    <div class="admin-card">
        <h3 style="color:var(--primary); margin-top:0;">📦 استيراد البيانات</h3>
        <textarea id="json" class="json-editor" placeholder="سيظهر الكود هنا بعد الضغط على زر اللصق..."></textarea>
        <div class="btn-group">
            <button class="btn btn-paste" onclick="pasteFromClipboard()">📋 لصق الكود (Paste)</button>
            <button class="btn btn-save" onclick="save()">💾 حفظ الأسئلة</button>
            <button class="btn btn-clear" onclick="clearBox()">🗑️ تفريغ</button>
            <button class="btn btn-reset" onclick="reset()">🔄 الوضع الافتراضي</button>
            <a class="btn btn-home" href="index.html">🎮 خروج</a>
        </div>
    </div>
</div>

<footer>
    من إعداد وتصميم: الأستاذ محمد أسرار - مدرسة ميمونة أم المؤمنين - مديرية مراكش
</footer>

<div class="status" id="status"></div>

<script>
const schemaKeys = ["phase1", "phase2", "phase4", "stock"];

function show(msg, isError = false){
    const s = document.getElementById('status');
    s.innerText = msg;
    s.style.display = 'block';
    s.style.background = isError ? '#ef4444' : '#10b981';
    setTimeout(() => s.style.display = 'none', 3000);
}

// دالة التوليد والنسخ التلقائي بدون إظهار النص
function generateAndCopy(){
    const lesson = document.getElementById('lesson').value;
    const level = document.getElementById('level').value;
    const diff = document.getElementById('diff').value;
    const ai = document.getElementById('ai').value;

    if(!lesson) { show('⚠️ يرجى كتابة اسم الدرس أولاً', true); return; }

    let p = `إليك بروتوكول توليد بيانات "معترك الضاد" (إصدار 2026).
مهمتك: ملء القالب التقني التالي بأسئلة درس "${lesson}" للمستوى "${level}" بصعوبة "${diff}".

[القواعد الصارمة]:
1. ممنوع تغيير أسماء المفاتيح (phase1, phase2, phase4, stock, تراكيب، صرف، إملاء).
2. ممنوع إضافة أي نص خارج حدود الـ JSON.
3. الالتزام بالأعداد: 6 للنمط 1، 12 للنمط 2، 4 لكل مكون في النمط 3، 4 للنمط 4.
4. "a" في الأنماط 1 و 2 هو رقم (0-3).

[القالب المطلوب تعبئته]:
{
  "phase1": [ {"q": "سؤال", "o": ["0", "1", "2", "3"], "a": 0} ],
  "phase2": [ {"q": "سؤال", "o": ["0", "1", "2", "3"], "a": 0} ],
  "phase4": [ {"q": "سؤال", "a": "جواب"} ],
  "stock": {
    "تراكيب": [ {"q": "سؤال", "a": "جواب"} ],
    "صرف": [ {"q": "سؤال", "a": "جواب"} ],
    "إملاء": [ {"q": "سؤال", "a": "جواب"} ]
  }
}`;

    if(ai === 'gemini') p = "STRICTLY OUTPUT VALID JSON ONLY\n" + p;

    // النسخ للخلفية
    navigator.clipboard.writeText(p).then(() => {
        show('✅ تم توليد البرومبت ونسخه بنجاح! اذهب الآن لـ ' + (ai === 'gemini' ? 'Gemini' : 'ChatGPT'));
    });
}

// دالة اللصق التلقائي بضغطة زر
async function pasteFromClipboard() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('json').value = text;
        show('📋 تم لصق الكود بنجاح');
    } catch (err) {
        show('❌ فشل اللصق التلقائي، استخدم Ctrl+V', true);
    }
}

function save(){
    const content = document.getElementById('json').value.trim();
    if(!content) { show('❌ الصندوق فارغ!', true); return; }
    try {
        const d = JSON.parse(content);
        const isValid = schemaKeys.every(k => Object.keys(d).includes(k));
        if(isValid) {
            localStorage.setItem('moatark_questions', JSON.stringify(d));
            show('💾 تم حفظ بنك الأسئلة بنجاح');
        } else {
            show('⚠️ تنبيه: الملف غير مطابق للمواصفات', true);
        }
    } catch(e) {
        show('❌ خطأ: الكود ليس ملف JSON صحيح', true);
    }
}

function clearBox() {
    document.getElementById('json').value = '';
    show('🗑️ تم التفريغ');
}

function reset() {
    if(confirm('هل تريد العودة للأسئلة الافتراضية؟')) {
        localStorage.removeItem('moatark_questions');
        show('🔄 تمت العودة للوضع الافتراضي');
    }
}
</script>
</body>
</html>
