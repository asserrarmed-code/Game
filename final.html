<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>النهائي الكبير: مُعترك الضاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; max-width: 100%; }
        :root { 
            --final-gold: #c5a059; --final-black: #0f172a; --card-dark: #1e293b; 
            --text-gold: #f3e5ab; --success: #10b981; --danger: #ef4444;
        }
        body { 
            background-color: var(--final-black); background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png');
            color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; min-height: 100vh; 
            display: flex; flex-direction: column; overflow-x: hidden;
        }
        .container { 
            width: 95%; max-width: 850px; margin: 0 auto; flex: 1; 
            display: none; flex-direction: column; justify-content: center;
            padding: 20px 0 180px 0;
        }
        #setup-screen {
            position: fixed; inset: 0; background: var(--final-black); z-index: 20000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .setup-card {
            background: var(--card-dark); padding: 30px; border-radius: 20px; border: 3px solid var(--final-gold);
            text-align: center; width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .setup-card input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 2px solid var(--final-gold);
            font-family: 'Cairo'; font-weight: bold; font-size: 1.1rem; text-align: center; background: white; color: black;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; width: 100%; max-width: 1000px; margin: 0 auto; }
        .logo-box { width: clamp(40px, 8vh, 65px); height: clamp(40px, 8vh, 65px); background: white; border-radius: 50%; border: 2px solid var(--final-gold); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .title-area h1 { font-family: 'Amiri', serif; font-size: clamp(1rem, 4vh, 1.8rem); margin: 0; color: var(--final-gold); text-align: center; }
        .card { 
            background: var(--card-dark); padding: clamp(15px, 3vh, 25px); border-radius: 20px; 
            border-top: 6px solid var(--final-gold); box-shadow: 0 0 30px rgba(0,0,0,0.4); 
            text-align: center; position: relative; width: 100%; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .scoreboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .team-box { 
            background: #0f172a; padding: clamp(8px, 2vh, 15px); border-radius: 15px; 
            border: 3px solid #334155; color: var(--text-gold); text-align: center; transition: 0.3s; 
        }
        .active-team { border-color: var(--final-gold); box-shadow: 0 0 20px var(--final-gold); transform: scale(1.02); }
        #challenge-alert { font-size: clamp(0.9rem, 2vh, 1.2rem); color: var(--final-gold); font-weight: 900; animation: pulse 1.5s infinite; display: none; margin-bottom: 15px; border: 2px dashed var(--final-gold); padding: 8px; border-radius: 15px; width: 100%; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
        .admin-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #020617; 
            padding: 10px; border-top: 5px solid var(--final-gold); 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; 
            gap: 15px; z-index: 10000; min-height: 140px; 
        }
        .btn-admin { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: 900; font-size: 0.85rem; }
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; width: 100%; }
        .btn-cat { background: var(--final-gold); color: black; padding: clamp(10px, 2vh, 15px); border-radius: 10px; font-weight: 900; cursor: pointer; border: none; font-size: clamp(0.7rem, 2vw, 1rem); }
        .btn-cat:disabled { background: #334155; color: #64748b; opacity: 0.5; }
        #timer { font-size: clamp(2rem, 7vh, 3.5rem); color: var(--danger); font-weight: 900; line-height: 1; margin: 5px 0; }
        #q-text { font-size: clamp(1rem, 3.5vh, 1.6rem); font-family: 'Amiri'; color: white; font-weight: bold; line-height: 1.4; padding: 0 10px; }
        .footer-credit { position: fixed; bottom: 145px; left: 0; right: 0; font-size: 0.7rem; color: rgba(197,160,89,0.4); font-weight: bold; text-align: center; pointer-events: none; }
        .answer-box { margin-top: 15px; padding: 12px; border-radius: 12px; background: rgba(197,160,89,0.1); border: 1px solid var(--final-gold); display: none; width: 100%; }
        .finish-msg { color: var(--final-gold); font-size: 2.2rem; font-weight: 900; animation: royalPulse 2s infinite; text-align: center; }
        @keyframes royalPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h2 style="color:var(--final-gold)">⚔️ معترك الضاد: النهائي ⚔️</h2>
            <p>أدخل أسماء المجموعتين المتنافستين:</p>
            <input type="text" id="name1" placeholder="اسم المجموعة الأولى">
            <input type="text" id="name2" placeholder="اسم المجموعة الثانية">
            <button class="btn-admin" style="background:var(--final-gold); color:black; width:100%; margin-top:15px; font-size:1.2rem;" onclick="startFinal()">بدء المعترك 🚀</button>
        </div>
    </div>

    <div class="header-top">
        <div class="logo-box"><img src="logo-cup.png" alt="Cup"></div>
        <div class="title-area"><h1>🏆 النهائي الكبير 🏆</h1></div>
        <div class="logo-box"><img src="logo.png" alt="School"></div>
    </div>

    <div class="footer-credit">من إعداد وتصميم الأستاذ محمد أسرار -مدرسة ميمونة أم المؤمنين-مديرية مراكش-</div>

    <div id="quiz-screen" class="container">
        <div id="dynamic-scoreboard" class="scoreboard"></div>
        <div class="card" id="main-card">
            <div id="challenge-alert"></div>
            <div id="phase-label" style="background:var(--final-gold); color:black; padding:3px 15px; border-radius:50px; font-size:0.8rem; display:inline-block; margin-bottom:8px; font-weight:900;"></div>
            <div id="timer">--</div>
            <div id="q-text">يتم التحضير...</div>
            <div id="choice-container" class="category-grid" style="display:none;"></div>
            <div class="answer-box" id="manual-zone">
                <div id="manual-answer-display" style="color: var(--final-gold); font-size: 1.4rem; font-weight: 900;">...</div>
            </div>
        </div>
        
        <div class="admin-panel" id="admin-p">
            <div style="display: flex; flex-direction: column; gap: 5px; border-left: 2px solid #334155; padding-left: 10px;">
                <button class="btn-admin" style="background:var(--danger); color:white; font-size:0.7rem;" onclick="goToIndex()">🏠 مسابقة جديدة</button>
                <button class="btn-admin" style="background:#475569; color:white; font-size:0.7rem;" onclick="resetFinalOnly()">↩️ إعادة النهائي</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px; align-items: center;">
                <input type="text" id="answer-input" style="padding:8px; width:130px; border-radius:8px; text-align:center; font-weight:bold;" placeholder="الجواب...">
                <div style="display: flex; gap: 5px;">
                    <button class="btn-admin" style="background:var(--success); color:white" onclick="reveal()">✅ كشف</button>
                    <button class="btn-admin" style="background:var(--final-gold); color:black" onclick="next()">التالي ➡️</button>
                </div>
            </div>
            <div id="admin-score-controls" style="display:flex; gap:8px;"></div>
        </div>
    </div>

<script>
    let currentPhase = 0, currentQ = 0, timer, scores = [0,0], teamNames = [];
    let votedOnThisQuestion = [false, false];
    let selectionCount = [0, 0];
    let activeTeam = Math.floor(Math.random() * 2);

    const finalPhases = [
        { 
            name: "1. نمط التحدي الفردي (الافتتاحية)", type: "individual", time: 20, 
            questions: [
                {q: "أعرب نورٌ إعراباً تاماً: (العلمُ نورٌ يُستضاءُ بهِ).", a: "نورٌ: خبر المبتدأ مرفوع بالضمة الظاهرة على آخره"},
                {q: "حول الجملة التالية للمثنى المؤنث: (هو يَسعى لِـنيلِ الجائزةِ).", a: "هما تسعيانِ لنيلِ الجائزةِ"},
                {q: "علل رسم الهمزة في كلمة **'لُؤلُؤ'** (الأولى والمتطرفة).", a: "الأولى: ساكنة بعد ضم / المتطرفة: متطرفة مسبوقة بضم"}
            ]
        },
        { 
            name: "2. نمط المواجهة الموجهة", type: "target", time: 20, 
            questions: [
                {q: "ما إعراب كلمة **'أبَويك'** في: (أطعْ أبَويك نيلًا لرضا الله)؟", a: "مفعول به منصوب بالياء لأنه مثنى"},
                {q: "اجعل كلمة **(اجتهاد)** مفعولاً مطلقاً **لبيان النوع** في جملة مفيدة.", a: "مثال: اجتهد التلميذ اجتهاد المتفوق "},
                {q: "صغ اسم التفضيل من فعل **'آمنَ'** في جملة مفيدة.", a: "أكثرُ إيماناً (لأن الفعل غير ثلاثي)"},
                {q: "صغ اسم الآلة من الأفعال **'سار'** و **'ذاع'** وحدد الوزن الصرفي.", a: "سيّارة (فعّالة) / مِذياع (مفعال)"}
            ]
        },
        { 
            name: "3. نمط الاختيار الحر (مخزون النوابغ)", type: "choice", time: 25, 
            categories: {
                "تراكيب": [
                    {q: "أعرب كلمة **'كلتا'** في جملة: (كلتا الشجرتينِ مثمرتانِ).", a: "مبتدأ مرفوع بالضمة المقدرة على الألف"},
                    {q: "استخرج المفعول المطلق وبين نوعه: (**ورتلِ القرآنَ ترتيلاً**).", a: "ترتيلاً: نوعه لتوكيد الفعل"}
                ],
                "صرف": [
                    {q: "صغ المصدر من الأفعال التالية: (**زكّى - تزلزل - استقام**).", a: "تزكية - تزلزل - استقامة"},
                    {q: "صغ اسم الآلة من الأفعال **(قرض)** و **(برد)** على أوزان مختلفة.", a: "مِقراض (مفعال) - مِبرد (مِفعل)"}
                ],
                "إملاء": [
                    {q: "ما الفرق في الكتابة (الألف اللينة) بين: (**يحيى**) و (**يحيا**)؟", a: "يحيى: اسم علم (مقصورة) / يحيا: فعل مضارع (ممدودة)"},
                    {q: "لماذا كتبت التاء مربوطة في كلمة **'رعاة'**؟", a: "   تكتب مربوطة لأنها جمع مذكر وقبلها مد ألف"}
                ]
            }
        },
        { 
            name: "4. جولة الحسم (السرعة القاتلة)", type: "speed", time: 8, 
            questions: [
                {q: "صرّف فعل **(وقى)** في الأمر مع ضمير المخاطبة **(أنتِ)**.", a: "قِـي"},
                {q: "أعرب شبه الجملة (الظرف) في: (رأيتُ القائدَ فوقَ المنصةِ).", a: "شبه جملة في محل نصب حال"},
                {q: "أدخل **(كان)** على الجملة وغير ما يلزم: (أبوك ذو علمٍ).", a: "كان أبوك ذا علمٍ"},
                {q: "أدخل أداة شرط جازمة على: (تدرسون بجدٍّ تنجحون).", a: "إن تدرسوا بجدٍّ تنجحوا (حذف النون)"},
                {q: "علل: لماذا نكتب **'ملاءمة'** على السطر وليس على الألف (**ملاأمة**)؟", a: " لأن الهمزة مفتوحة مسبوقة بألف ساكنة ولا يمكن التقاء ألفان متتابعان"}
            ]
        }
    ];

    function startFinal() {
        teamNames = [document.getElementById('name1').value || "المجموعة 1", document.getElementById('name2').value || "المجموعة 2"];
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'flex';
        renderScoreboard();
        init();
    }

    function renderScoreboard() {
        const sb = document.getElementById('dynamic-scoreboard');
        const ctrl = document.getElementById('admin-score-controls');
        sb.innerHTML = ''; ctrl.innerHTML = '';
        teamNames.forEach((n, i) => {
            sb.innerHTML += `<div class="team-box" id="t-card-${i}"><span id="s-${i}" style="font-size:2rem; font-weight:900;">${scores[i]}</span><br><div style="font-size:0.9rem; font-weight:bold;">${n}</div></div>`;
            ctrl.innerHTML += `<div style="text-align:center; background:#1e293b; padding:8px; border-radius:10px; border:1px solid var(--final-gold);">
                <div style="font-size:0.7rem; color:var(--final-gold);">${n}</div>
                <div style="display:flex; gap:4px;">
                    <button class="btn-admin" style="background:var(--success); color:white; padding:4px 8px;" onclick="modifyScore(${i}, 10)">+10</button>
                    <button class="btn-admin" style="background:var(--danger); color:white; padding:4px 8px;" onclick="modifyScore(${i}, -5)">-5</button>
                </div>
            </div>`;
        });
    }

    function modifyScore(i, v) {
        if(votedOnThisQuestion[i]) return;
        scores[i] += v;
        document.getElementById(`s-${i}`).innerText = scores[i];
        votedOnThisQuestion[i] = true;
        document.getElementById(`t-card-${i}`).style.opacity = "0.4";
    }

    function init() {
        votedOnThisQuestion = [false, false];
        document.querySelectorAll('.team-box').forEach(b => {
            b.style.opacity = "1"; b.classList.remove('active-team');
        });

        const p = finalPhases[currentPhase];
        const alertBox = document.getElementById('challenge-alert');
        const qText = document.getElementById('q-text');
        
        qText.style.display = 'block'; 
        document.getElementById('phase-label').innerText = p.name;
        document.getElementById('manual-zone').style.display = "none";
        document.getElementById('choice-container').style.display = "none";
        clearInterval(timer);
        document.getElementById('timer').innerText = "--";

        if (p.type === 'choice') {
            alertBox.style.display = "block";
            alertBox.innerText = `🎲 الدور لـ: ${teamNames[activeTeam]} (اختيار ${selectionCount[activeTeam]+1} من 3)`;
            document.getElementById(`t-card-${activeTeam}`).classList.add('active-team');
            qText.innerText = "اختر المكون المناسب من المخزون:";
            renderCategories();
            document.getElementById('choice-container').style.display = "grid";
        } else {
            const q = p.questions[currentQ];
            qText.innerText = q.q;
            alertBox.style.display = "block";
            if (p.type === 'individual') alertBox.innerText = "⚔️ تحدي الفرسان: ممنوع المساعدة ⚔️";
            else if (p.type === 'target') {
                const tid = currentQ % 2;
                alertBox.innerText = `🎯 الدور لـ: ${teamNames[tid]}`;
                document.getElementById(`t-card-${tid}`).classList.add('active-team');
            } else alertBox.style.display = "none";
            startTimer(p.time, p.type === 'speed');
        }
    }

    function renderCategories() {
        const container = document.getElementById('choice-container');
        const p = finalPhases[currentPhase];
        container.innerHTML = '';
        Object.keys(p.categories).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'btn-cat'; btn.innerText = `${cat} (${p.categories[cat].length})`;
            btn.disabled = p.categories[cat].length === 0;
            btn.onclick = () => {
                const qObj = p.categories[cat].shift();
                document.getElementById('choice-container').style.display = "none";
                document.getElementById('q-text').innerText = `[${cat}] ${qObj.q}`;
                p.currentChoiceAnswer = qObj.a;
                selectionCount[activeTeam]++;
                activeTeam = 1 - activeTeam;
                startTimer(p.time, false);
            };
            container.appendChild(btn);
        });
    }

    function startTimer(s, shouldHide) {
        clearInterval(timer);
        let tl = s; document.getElementById('timer').innerText = tl;
        timer = setInterval(() => { 
            tl--; 
            document.getElementById('timer').innerText = tl; 
            if(tl <= 0) {
                clearInterval(timer);
                if(shouldHide) { 
                    document.getElementById('q-text').style.display = 'none'; 
                }
            }
        }, 1000);
    }

    function reveal() {
        clearInterval(timer);
        const p = finalPhases[currentPhase];
        document.getElementById('q-text').style.display = 'block'; 
        document.getElementById('manual-answer-display').innerText = (p.type === 'choice') ? p.currentChoiceAnswer : p.questions[currentQ].a;
        document.getElementById('manual-zone').style.display = "block";
    }

    function next() {
        const p = finalPhases[currentPhase];
        if (p.type === 'choice') {
            if (selectionCount[0] >= 3 && selectionCount[1] >= 3) {
                currentPhase++;
                currentQ = 0;
                init();
            } else {
                init(); 
            }
        } else {
            currentQ++;
            if(currentQ >= p.questions.length) { currentQ = 0; currentPhase++; }
            
            if(currentPhase >= finalPhases.length) {
                const card = document.getElementById('main-card');
                card.innerHTML = `<div class="finish-msg">🏆 انتهى النهائي الكبير 🏆<br><span style="font-size:1.2rem; color:white;">مبارك للأبطال هذا الإنجاز المستحق</span></div>`;
                document.getElementById('admin-p').style.display = 'none'; 
            } else init();
        }
    }

    function goToIndex() { if(confirm("العودة للرئيسية؟")) window.location.href = 'index.html'; }
    function resetFinalOnly() { if(confirm("إعادة النهائي بالكامل؟")) window.location.reload(); }
</script>
</body>
</html>
