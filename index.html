<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مَارَاثُون الضَّاد | النسخة الاحترافية المحدثة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --moroccan-blue: #006847; 
            --moroccan-gold: #c5a059;
            --deep-red: #8b0000;
            --bg-light: #f4f1ea;
            --card: #ffffff;
            --text: #333;
            --success: #10b981; 
            --danger: #ef4444; 
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --moroccan-gold: #fbbf24;
        }

        body { 
            background-color: var(--bg-light);
            background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png');
            color: var(--text); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .header-top { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; max-width: 1000px; margin: 0 auto;
        }
        .logo-box { 
            width: clamp(60px, 10vw, 80px); height: clamp(60px, 10vw, 80px);
            background: white; border-radius: 50%; border: 2px solid var(--moroccan-gold); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .container { width: 95%; max-width: 900px; margin: 0 auto; padding-bottom: 160px; }

        .card {
            background: var(--card); padding: clamp(20px, 5vw, 35px); border-radius: 25px; 
            border-top: 8px solid var(--moroccan-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }

        #target-announcer {
            background: var(--danger); color: white; padding: 15px 30px; border-radius: 15px;
            font-weight: 900; font-size: 1.8rem; margin-bottom: 20px; display: none;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .scoreboard { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 10px; margin: 20px 0; 
        }
        .team-box { 
            background: var(--card); padding: 10px; border-radius: 15px; 
            border: 2px solid #ddd; text-align: center; transition: 0.4s;
        }
        .team-box.active-turn { border-color: var(--danger); transform: scale(1.05); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 20px 0; }
        .opt, .component-btn { 
            background: #f8fafc; color: #334155; border: 2px solid #e2e8f0; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; transition: 0.3s;
        }

        .admin-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; 
            color: white; padding: 10px; border-top: 4px solid var(--moroccan-gold);
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; z-index: 1000;
        }
        .btn-admin { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
        .btn-disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .comp-count { background: var(--deep-red); color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.8rem; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container" style="margin-top: 40px;">
        <div class="card">
            <h2 style="color:var(--moroccan-blue)">🏁 إعداد ماراثون الضاد (نسخة 6/4)</h2>
            <div style="margin: 20px 0;">
                <label>عدد المجموعات: </label>
                <select id="team-count" onchange="updateTeamInputs(this.value)" style="padding:8px; border-radius:8px;">
                    <option value="2">مجموعتان</option>
                    <option value="3">ثلاث مجموعات</option>
                    <option value="4" selected>أربع مجموعات</option>
                </select>
            </div>
            <div id="team-names-container" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px;"></div>
            <button class="btn-admin" style="background:var(--moroccan-blue); color:white; padding:15px 50px; font-size:1.2rem; border-radius:50px;" onclick="startMarathon()">ابدأ التحدي 🚀</button>
        </div>
    </div>

    <div id="quiz-screen" class="container" style="display:none; margin-top: 10px;">
        <div class="header-top">
            <div class="logo-box"><img src="logo-cup.png"></div>
            <div style="text-align:center"><h1 style="margin:0; font-family:'Amiri'; color:var(--moroccan-blue)">مَارَاثُون الضَّاد</h1></div>
            <div class="logo-box"><img src="logo.png"></div>
        </div>

        <div id="dynamic-scoreboard" class="scoreboard"></div>

        <div class="card">
            <div id="target-announcer"></div>
            <div id="phase-label" style="background:var(--moroccan-blue); color:white; padding:5px 20px; border-radius:50px; font-size:0.9rem; margin-bottom:10px; display:inline-block;"></div>
            <div id="timer" style="font-size: 3.5rem; font-weight: 900; color: var(--danger);">15</div>
            <div id="q-text" style="font-size: 1.8rem; margin: 20px 0; font-family:'Amiri'; font-weight: bold;"></div>
            
            <div id="component-selection" style="display:none; gap:10px; justify-content:center; margin:20px 0;">
                <button class="component-btn" onclick="selectComponent('تراكيب')">تراكيب <span id="count-تراكيب" class="comp-count"></span></button>
                <button class="component-btn" onclick="selectComponent('صرف')">صرف وتحويل <span id="count-صرف" class="comp-count"></span></button>
                <button class="component-btn" onclick="selectComponent('إملاء')">إملاء <span id="count-إملاء" class="comp-count"></span></button>
            </div>

            <div class="options-grid" id="opt-container"></div>
            <div id="manual-zone" style="display:none;"><div id="manual-answer-display" style="font-size:2rem; color:var(--moroccan-blue); border-bottom:2px dashed var(--moroccan-gold); padding:10px; font-weight:bold;">...</div></div>
        </div>

        <div class="admin-panel">
            <select id="help-target" style="padding:5px; border-radius:5px;"></select>
            <button class="btn-admin" style="background:#475569; color:white" onclick="execHelp('del')">❌ حذف</button>
            <button class="btn-admin" style="background:#475569; color:white" onclick="execHelp('frz')">❄️ تجميد</button>
            <button class="btn-admin" style="background:#475569; color:white" onclick="execHelp('dbl')">×2</button>
            <input type="text" id="answer-input" placeholder="إجابة التلميذ..." oninput="syncAnswer(this.value)" style="padding:8px; border-radius:5px; width:120px;">
            <button class="btn-admin" style="background:var(--success); color:white;" onclick="reveal()">كشف ✅</button>
            <button class="btn-admin" style="background:var(--moroccan-gold); color:black;" onclick="next()">التالي ➡️</button>
            <div id="admin-score-btns" style="display:flex; gap:4px;"></div>
        </div>
    </div>

<script>
    let teamNames = [], scores = [], multiplier = [], currentPhase = 0, currentQ = 0, timer;
    let teamScoringStatus = [], phaseTurns = [];

    let componentsStock = { 
        "تراكيب": { limit: 0, used: 0, questions: [
            "أعرب 'المسافرين' في: وصل المسافرون إلا المسافرين.", "حوّل الجملة 'أن تجتهد خير لك' إلى مصدر مؤول.", 
            "ما هو إعراب 'خمسة' في: اشتريت خمسة أقلام؟", "صغ جملة تتضمن حالاً جملة فعلية.",
            "ما هي الأدوات التي تجزم فعلين مضارعين؟", "أعرب 'أخاك' في: إن أخاك ذو مروءة."
        ] },
        "صرف": { limit: 0, used: 0, questions: [
            "صغ اسم المكان من فعل 'سجد'.", "ما هو وزن كلمة 'استغفار'؟", "حوّل الفعل 'دعا' إلى اسم فاعل.",
            "صغ اسم الآلة من فعل 'برد' مع ذكر وزنه.", "ما هو اسم التفضيل من فعل 'طاب'؟", "صغ اسم المفعول من فعل 'باع'."
        ] },
        "إملاء": { limit: 0, used: 0, questions: [
            "لماذا كتبت الهمزة متطرفة في كلمة 'دفء'؟", "اكتب كلمة 'ابن' بشكل صحيح في: 'يا ... الأكرمين'.", 
            "كيف تكتب الألف اللينة في فعل 'دنا'؟ ولماذا؟", "لماذا كتبت الهمزة متوسطة على الواو في 'سؤال'؟",
            "اكتب كلمة 'ابن' بين علمين في جملة مفيدة.", "ما هي القاعدة في كتابة التاء المربوطة في الأسماء؟"
        ] }
    };

    let targetedQuestionsStock = [
        { q: "إعراب 'الولدين' في: 'رأيت الولدين'.", o: ["مفعول به منصوب بالياء", "فاعل مرفوع بالألف"], a: 0 },
        { q: "اسم الآلة من 'نشر':", o: ["ناشر", "منشار"], a: 1 },
        { q: "الفعل المعتل المثال هو:", o: ["وعد", "قال", "رمى"], a: 0 },
        { q: "جمع 'قاضي' هو:", o: ["قضاة", "قاضون"], a: 0 },
        { q: "إعراب 'عشرين' في 'قرأت عشرين صفحة':", o: ["مفعول به", "تمييز"], a: 0 },
        { q: "الهمزة في 'امرأة' هي همزة:", o: ["وصل", "قطع"], a: 0 },
        { q: "صغ اسم المفعول من 'قاد':", o: ["مقود", "مقيود"], a: 0 },
        { q: "نوع الحال في 'جاء الطفل يضحك':", o: ["مفرد", "جملة فعلية"], a: 1 },
        { q: "أداة تجزم فعلاً واحداً:", o: ["لم", "إن"], a: 0 },
        { q: "اسم التفضيل من 'حسن':", o: ["حسين", "أحسن"], a: 1 },
        { q: "نوع الهمزة في 'أكل':", o: ["قطع", "وصل"], a: 0 },
        { q: "اسم الزمان من 'وعد':", o: ["موعد", "ميعاد"], a: 0 }
    ];

    const phasesData = [
        { name: "النمط 1: الموحد (6 أسئلة للجميع)", type: "all", time: 15, questions: [
            { q: "ما إعراب 'خالد' في: 'جاء خالدٌ'؟", o: ["فاعل", "مفعول به", "مبتدأ"], a: 0 },
            { q: "نوع الهمزة في 'إخراج' هي:", o: ["وصل", "قطع"], a: 1 },
            { q: "الفعل الأجوف هو ما كان وسطه حرف علة:", o: ["صح", "خطأ"], a: 0 },
            { q: "علامة رفع الأسماء الخمسة هي:", o: ["الضمة", "الواو"], a: 1 },
            { q: "نوع الخبر في 'الشمس نورها ساطع':", o: ["مفرد", "جملة اسمية"], a: 1 },
            { q: "المستثنى بعد 'إلا' في الكلام التام المثبت يكون:", o: ["منصوباً", "مرفوعاً"], a: 0 }
        ]},
        { name: "النمط 2: الموجه (3 أسئلة لكل مجموعة)", type: "target", time: 15 },
        { name: "النمط 3: الاختيار الحر (5 أسئلة لكل مجموعة)", type: "free", time: 15 },
        { name: "النمط 4: السرعة القصوى (4 أسئلة تحدي)", type: "speed", time: 10, questions: [
            { q: "إعراب 'لن':", o: ["حرف نصب", "حرف جزم"], a: 0 },
            { q: "اسم التفضيل من 'كرم':", o: ["كريم", "أكرم"], a: 1 },
            { q: "وزن 'انطلق' هو انفعل:", o: ["صح", "خطأ"], a: 0 },
            { q: "تكتب التاء مبسوطة في الأفعال دائماً:", o: ["صح", "خطأ"], a: 0 }
        ]}
    ];

    function updateTeamInputs(count) {
        const container = document.getElementById('team-names-container');
        container.innerHTML = '';
        for(let i=0; i<count; i++) container.innerHTML += `<input type="text" id="tn-${i}" value="المجموعة ${i+1}" style="padding:8px; width:110px; text-align:center; border-radius:8px; border:1px solid #ccc;">`;
    }

    function startMarathon() {
        const count = parseInt(document.getElementById('team-count').value);
        teamNames = []; scores = []; multiplier = []; 
        for(let i=0; i<count; i++) {
            teamNames.push(document.getElementById(`tn-${i}`).value);
            scores.push(0); multiplier.push(1);
        }
        let totalFreeQs = count * 5;
        for(let k in componentsStock) componentsStock[k].limit = Math.ceil(totalFreeQs / 3);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        renderAdminAndScore();
        preparePhaseTurns();
        init();
    }

    function renderAdminAndScore() {
        const sb = document.getElementById('dynamic-scoreboard');
        const adminBtns = document.getElementById('admin-score-btns');
        const helpTarget = document.getElementById('help-target');
        sb.innerHTML = ''; adminBtns.innerHTML = ''; helpTarget.innerHTML = '';
        teamNames.forEach((name, i) => {
            sb.innerHTML += `<div class="team-box" id="t-card-${i}"><span id="s-${i}" style="font-size:1.8rem; font-weight:900; color:var(--deep-red)">0</span><div style="font-weight:bold">${name}</div></div>`;
            adminBtns.innerHTML += `<div id="ctrl-${i}" style="text-align:center"><button class="score-btn" onclick="modifyScore(${i}, 10)" style="background:var(--success); color:white; border:none; border-radius:4px; margin-bottom:2px; padding:4px 8px;">+10</button><br><button class="score-btn" onclick="modifyScore(${i}, -5)" style="background:var(--danger); color:white; border:none; border-radius:4px; padding:4px 8px;">-5</button></div>`;
            helpTarget.innerHTML += `<option value="${i}">${name}</option>`;
        });
    }

    function preparePhaseTurns() {
        phaseTurns = [];
        const count = teamNames.length;
        if(phasesData[currentPhase].type === 'target') {
            for(let i=0; i<count; i++) for(let j=0; j<3; j++) phaseTurns.push(i);
        } else if(phasesData[currentPhase].type === 'free') {
            for(let i=0; i<count; i++) for(let j=0; j<5; j++) phaseTurns.push(i);
        }
        phaseTurns.sort(() => Math.random() - 0.5);
    }

    function init() {
        const p = phasesData[currentPhase];
        const ann = document.getElementById('target-announcer');
        document.getElementById('phase-label').innerText = p.name;
        document.getElementById('q-text').innerText = '';
        document.getElementById('opt-container').innerHTML = '';
        document.getElementById('component-selection').style.display = 'none';
        document.getElementById('manual-zone').style.display = 'none';
        document.getElementById('answer-input').value = '';
        document.getElementById('manual-answer-display').innerText = '...';
        document.querySelectorAll('.team-box').forEach(b => b.classList.remove('active-turn'));
        teamScoringStatus = teamNames.map(() => false);
        document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('btn-disabled'));
        clearInterval(timer);

        if(p.type === 'target' || p.type === 'free') {
            const tid = phaseTurns[currentQ];
            ann.style.display = 'block';
            ann.innerHTML = `🎯 الدور على مجموعة: <br><span style="font-size:2.2rem; border-bottom:3px solid white;">${teamNames[tid]}</span>`;
            document.getElementById(`t-card-${tid}`).classList.add('active-turn');
            if(p.type === 'free') showFreeSelection();
            else displayTargetQuestion();
        } else {
            ann.style.display = 'none';
            displayQuestion(p.questions[currentQ]);
        }
    }

    function displayTargetQuestion() {
        if(targetedQuestionsStock.length === 0) return;
        let randomIndex = Math.floor(Math.random() * targetedQuestionsStock.length);
        let q = targetedQuestionsStock.splice(randomIndex, 1)[0];
        displayQuestion(q);
    }

    function displayQuestion(q) {
        document.getElementById('q-text').innerText = q.q;
        q.o.forEach((opt, i) => document.getElementById('opt-container').innerHTML += `<button class="opt" onclick="this.style.borderColor='var(--moroccan-blue)'">${opt}</button>`);
        startTimer(phasesData[currentPhase].time);
    }

    function showFreeSelection() {
        document.getElementById('component-selection').style.display = 'flex';
        for(let key in componentsStock) {
            let rem = componentsStock[key].limit - componentsStock[key].used;
            document.getElementById(`count-${key}`).innerText = rem;
            document.querySelector(`button[onclick="selectComponent('${key}')"]`).style.display = rem > 0 ? 'block' : 'none';
        }
    }

    function selectComponent(key) {
        document.getElementById('component-selection').style.display = 'none';
        document.getElementById('manual-zone').style.display = 'block';
        let randomIndex = Math.floor(Math.random() * componentsStock[key].questions.length);
        let q = componentsStock[key].questions.splice(randomIndex, 1)[0];
        componentsStock[key].used++;
        document.getElementById('q-text').innerText = `[${key}] ${q}`;
        startTimer(15);
    }

    function startTimer(s) {
        let tl = s; document.getElementById('timer').innerText = tl;
        timer = setInterval(() => { tl--; document.getElementById('timer').innerText = tl; if(tl<=0) clearInterval(timer); }, 1000);
    }

    function modifyScore(i, v) {
        if(teamScoringStatus[i]) return;
        let p = (v > 0) ? (v * multiplier[i]) : v;
        scores[i] += p; multiplier[i] = 1;
        document.getElementById(`s-${i}`).innerText = scores[i];
        teamScoringStatus[i] = true;
        document.getElementById(`ctrl-${i}`).querySelectorAll('button').forEach(b => b.classList.add('btn-disabled'));
    }

    function reveal() {
        clearInterval(timer);
        document.getElementById('manual-answer-display').style.color = 'var(--success)';
    }

    function next() {
        currentQ++;
        let limit = (phasesData[currentPhase].type === 'target' || phasesData[currentPhase].type === 'free') ? phaseTurns.length : phasesData[currentPhase].questions.length;
        if(currentQ >= limit) { currentQ = 0; currentPhase++; if(currentPhase < phasesData.length) preparePhaseTurns(); }
        if(currentPhase >= phasesData.length) alert("انتهى الماراثون بنجاح! 🏆");
        else init();
    }

    function syncAnswer(v) { document.getElementById('manual-answer-display').innerText = v || '...'; }
    function execHelp(type) {
        let t = document.getElementById('help-target').value;
        if(type === 'frz') clearInterval(timer);
        if(type === 'dbl') multiplier[t] = 2;
        if(type === 'del') { let opts = document.querySelectorAll('.opt'); if(opts.length > 1) opts[0].style.visibility = 'hidden'; }
    }
    updateTeamInputs(4);
</script>
</body>
</html>
